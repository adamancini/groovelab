apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: groovelab
spec:
  chart:
    name: groovelab
    # chartVersion is rewritten at release time (both in CI
    # via .github/workflows/release.yaml and locally via `make release-unstable`)
    # to match `chart/Chart.yaml.version`. The checked-in value here only
    # needs to be a valid semver so `replicated lint` passes; keep it in
    # sync with Chart.yaml on `main` to minimise noise in diffs. CI owns
    # the authoritative rewrite. See chart/README.md "Version invariant".
    chartVersion: 0.1.1
  releaseName: groovelab
  namespace: groovelab
  useHelmInstallOperator: true
  helmUpgradeFlags:
    - --atomic
    - --timeout=300s
  values:
    features:
      trackExport:
        enabled: '{{repl LicenseFieldValue "track_export_enabled"}}'
    auth:
      sessionDuration: '{{repl ConfigOption "session_duration"}}'
      guestAccess: '{{repl ConfigOptionEquals "guest_access" "1"}}'
    flashcards:
      maxCardsPerSession: '{{repl ConfigOption "max_cards_per_session"}}'
  optionalValues:
    - when: '{{repl ne (LicenseFieldValue "track_export_enabled") ""}}'
      recursiveMerge: true
      values:
        features:
          trackExport:
            enabled: '{{repl LicenseFieldValue "track_export_enabled"}}'
    # External-database mapping is gated on db_type=external so plain-helm
    # installs (where ConfigOption returns empty) keep the embedded CNPG path.
    - when: '{{repl ConfigOptionEquals "db_type" "external"}}'
      recursiveMerge: true
      values:
        cnpg:
          createCluster: false
        externalDatabase:
          host: '{{repl ConfigOption "external_db_host"}}'
          port: '{{repl ConfigOption "external_db_port"}}'
          username: '{{repl ConfigOption "external_db_user"}}'
          password: '{{repl ConfigOption "external_db_password"}}'
          sslMode: '{{repl ConfigOption "external_db_ssl_mode"}}'
