apiVersion: kots.io/v1beta1
kind: Application
metadata:
  name: groovelab
spec:
  title: Groovelab
  icon: https://raw.githubusercontent.com/adamancini/groovelab/main/assets/icon.png
  statusInformers:
    - deployment/groovelab-frontend
    - deployment/groovelab-backend
    - deployment/groovelab-valkey
    - deployment/groovelab-sdk
    # Conditional: only watch the CNPG StatefulSet when using embedded PostgreSQL.
    # When external_db_enabled is set to 1, the CNPG Cluster is not rendered
    # (cnpg.createCluster: false) and the StatefulSet does not exist.
    - '{{repl if not (ConfigOptionEquals "external_db_enabled" "1")}}statefulset/groovelab-postgresql{{repl end}}'
  ports:
    - serviceName: groovelab-frontend
      servicePort: 443
      localPort: 443
      applicationUrl: "https://groovelab.local"
