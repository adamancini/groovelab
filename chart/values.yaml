# Groovelab Helm chart values

global:
  imagePullSecrets: []
  replicated:
    dockerconfigjson: ""

images:
  pullSecrets: []

image:
  frontend:
    repository: proxy.xyyzx.net/proxy/groovelab/ghcr.io/adamancini/groovelab-frontend
    # tag is empty by default; templates fall back to .Chart.AppVersion (which
    # CI rewrites from the git tag at release time, e.g. v0.1.0). Local
    # overrides via --set image.frontend.tag=dev-local still work.
    tag: ""
    pullPolicy: IfNotPresent
  backend:
    repository: proxy.xyyzx.net/proxy/groovelab/ghcr.io/adamancini/groovelab-backend
    # tag is empty by default; templates fall back to .Chart.AppVersion (which
    # CI rewrites from the git tag at release time, e.g. v0.1.0). Local
    # overrides via --set image.backend.tag=dev-local still work.
    tag: ""
    pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 443
  nodePort: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: groovelab.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

cloudnative-pg:
  enabled: true

cnpg:
  # createCluster controls whether the postgresql.cnpg.io/v1 Cluster resource
  # is created. Set false only when pointing at an external/pre-existing cluster.
  createCluster: true
  instances: 1
  database: groovelab
  owner: groovelab
  password: ""
  storage:
    size: 1Gi

externalDatabase:
  host: ""
  port: 5432
  database: groovelab
  username: groovelab
  password: ""
  existingSecret: ""
  sslMode: "require"

valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "8"
  storage:
    size: 1Gi

cert-manager:
  enabled: true
  installCRDs: true

replicated:
  enabled: true
  fullnameOverride: "groovelab-sdk"

airgap:
  networkPolicy:
    enabled: false

features:
  trackExport:
    # enabled is controlled by the track_export_enabled license entitlement field.
    # Default false; overridden by KOTS HelmChart CR or operator --set flag.
    enabled: "false"

# crdCheck — post-install/post-upgrade Helm hook Job that waits for required
# CRDs (e.g. clusters.postgresql.cnpg.io from the CNPG operator) to be
# Established before downstream operations run. Belt-and-suspenders for
# install-time ordering: helmfile sequences CNPG before groovelab in CI, but
# this hook makes the chart safe under ANY install path (bare `helm install`,
# KOTS, Embedded Cluster).
#
# Disable for airgap / offline installs that pre-establish CRDs out-of-band:
#   --set crdCheck.enabled=false
#
# See chart/README.md "CRD-check post-install hook" and GRO-s3mc.
crdCheck:
  enabled: true
  # Image: NOT bitnami/kubectl (banned per CLAUDE.md). registry.k8s.io/kubectl
  # is the official upstream image published by the Kubernetes project.
  image:
    repository: registry.k8s.io/kubectl
    tag: v1.32.0
    pullPolicy: IfNotPresent
  # Required CRDs to wait for. Add subchart CRDs here as the chart grows.
  crds:
    - clusters.postgresql.cnpg.io
  # Per-CRD wait timeout (seconds).
  timeout: 60
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
