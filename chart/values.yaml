# Groovelab Helm chart values

image:
  frontend:
    repository: proxy.xyyzx.net/adamancini/groovelab-frontend
    tag: ""
    pullPolicy: IfNotPresent
  backend:
    repository: proxy.xyyzx.net/adamancini/groovelab-backend
    tag: ""
    pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 443
  nodePort: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: groovelab.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

cloudnative-pg:
  enabled: true

cnpg:
  instances: 1
  database: groovelab
  owner: groovelab
  password: ""
  storage:
    size: 1Gi

externalDatabase:
  host: ""
  port: 5432
  database: groovelab
  username: groovelab
  password: ""
  existingSecret: ""
  sslMode: "require"

valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "8"
  storage:
    size: 1Gi

cert-manager:
  enabled: true
  installCRDs: true

replicated:
  enabled: true
  fullnameOverride: "groovelab-sdk"

airgap:
  networkPolicy:
    enabled: false
