# Groovelab Helm chart values

global:
  imagePullSecrets: []
  replicated:
    dockerconfigjson: ""

images:
  pullSecrets: []

image:
  frontend:
    repository: proxy.xyyzx.net/proxy/groovelab/ghcr.io/adamancini/groovelab-frontend
    # tag is empty by default; templates fall back to .Chart.AppVersion (which
    # CI rewrites from the git tag at release time, e.g. v0.1.0). Local
    # overrides via --set image.frontend.tag=dev-local still work.
    tag: ""
    pullPolicy: IfNotPresent
  backend:
    repository: proxy.xyyzx.net/proxy/groovelab/ghcr.io/adamancini/groovelab-backend
    # tag is empty by default; templates fall back to .Chart.AppVersion (which
    # CI rewrites from the git tag at release time, e.g. v0.1.0). Local
    # overrides via --set image.backend.tag=dev-local still work.
    tag: ""
    pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 443
  nodePort: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: groovelab.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

cloudnative-pg:
  enabled: true

cnpg:
  # createCluster controls whether the postgresql.cnpg.io/v1 Cluster resource
  # is created. Set false only when pointing at an external/pre-existing cluster.
  createCluster: true
  instances: 1
  database: groovelab
  owner: groovelab
  password: ""
  storage:
    size: 1Gi

externalDatabase:
  host: ""
  port: 5432
  database: groovelab
  username: groovelab
  password: ""
  existingSecret: ""
  sslMode: "require"

valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "8"
  storage:
    size: 1Gi

cert-manager:
  enabled: true
  installCRDs: true

replicated:
  enabled: true
  fullnameOverride: "groovelab-sdk"

airgap:
  networkPolicy:
    enabled: false

# crdCheck: pre-install/pre-upgrade Helm hook that blocks chart reconciliation
# until the CRDs groovelab's templates depend on are Established. Belt-and-
# suspenders for install paths where subchart CRDs race with parent CRs. See
# chart/templates/crd-check-job.yaml and chart/README.md "CRD-check hook".
#
# Image choice: alpine/k8s (non-Bitnami, multi-arch). The project CLAUDE.md
# bans Bitnami images; the platform-examples reference pattern at
# replicatedhq/platform-examples/patterns/multi-chart-orchestration uses
# bitnami/kubectl — we deliberately do not.
crdCheck:
  enabled: true
  image:
    repository: alpine/k8s
    tag: "1.32.3"
    pullPolicy: IfNotPresent
  # CRDs to wait on. Default list matches the CRDs groovelab's templates
  # reference directly. Additional entries may be appended by downstream
  # installs (e.g. cert-manager's certificates.cert-manager.io if a consumer
  # pulls the CR into the chart).
  crds:
    - name: clusters.postgresql.cnpg.io
  timeout: 60
  backoffLimit: 2
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

features:
  trackExport:
    # enabled is controlled by the track_export_enabled license entitlement field.
    # Default false; overridden by KOTS HelmChart CR or operator --set flag.
    enabled: "false"
