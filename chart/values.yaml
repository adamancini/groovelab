# Groovelab Helm chart values

global:
  imagePullSecrets: []
  replicated:
    dockerconfigjson: ""

images:
  pullSecrets: []

image:
  frontend:
    repository: proxy.xyyzx.net/proxy/groovelab/ghcr.io/adamancini/groovelab-frontend
    tag: "51640a6"
    pullPolicy: IfNotPresent
  backend:
    repository: proxy.xyyzx.net/proxy/groovelab/ghcr.io/adamancini/groovelab-backend
    tag: "51640a6"
    pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 443
  nodePort: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: groovelab.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

cloudnative-pg:
  enabled: true

cnpg:
  # createCluster controls whether the postgresql.cnpg.io/v1 Cluster resource
  # is created. Set false only when pointing at an external/pre-existing cluster.
  createCluster: true
  instances: 1
  database: groovelab
  owner: groovelab
  password: ""
  storage:
    size: 1Gi

externalDatabase:
  host: ""
  port: 5432
  database: groovelab
  username: groovelab
  password: ""
  existingSecret: ""
  sslMode: "require"

valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "8"
  storage:
    size: 1Gi

cert-manager:
  enabled: true
  installCRDs: true

replicated:
  enabled: true
  fullnameOverride: "groovelab-sdk"

airgap:
  networkPolicy:
    enabled: false
