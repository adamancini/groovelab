# Groovelab Helm chart values

image:
  frontend:
    repository: ghcr.io/adamancini/groovelab-frontend
    tag: ""
    pullPolicy: IfNotPresent
  backend:
    repository: ghcr.io/adamancini/groovelab-backend
    tag: ""
    pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 443
  nodePort: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: groovelab.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

postgresql:
  enabled: true
  auth:
    database: groovelab
    username: groovelab
    password: ""
    existingSecret: ""

externalDatabase:
  host: ""
  port: 5432
  database: groovelab
  username: groovelab
  password: ""
  existingSecret: ""
  sslMode: "require"

redis:
  enabled: true
  auth:
    enabled: true
    password: ""
    existingSecret: ""

cert-manager:
  enabled: true
  installCRDs: true

replicated:
  enabled: true
  fullnameOverride: "groovelab-sdk"

airgap:
  networkPolicy:
    enabled: false
