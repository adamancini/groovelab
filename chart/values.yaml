# Groovelab Helm chart values

global:
  imagePullSecrets: []
  # NOTE: do NOT set `global.replicated.dockerconfigjson` here. The Replicated
  # SDK subchart uses `hasKey` to decide whether to render the
  # `enterprise-pull-secret` Secret from this value, and `hasKey` returns true
  # for an empty string. Shipping `dockerconfigjson: ""` therefore renders an
  # invalid Secret (`data[.dockerconfigjson]: Invalid value: "": unexpected
  # end of JSON input`) on customer-helm installs that don't pull the chart
  # through Replicated's OCI registry (which injects the real value).
  #
  # Install paths that legitimately need the secret set it explicitly:
  #   - registry.replicated.com OCI pull: Replicated injects the value at
  #     publish time.
  #   - KOTS / Embedded Cluster: KOTS sets it via HelmChart `values:` overrides.
  #   - Customer plain-Helm with proxy.xyyzx.net pulls: caller passes
  #     `--set global.replicated.dockerconfigjson=...` themselves.
  # Everyone else (helmfile dev, bare CMX smoke installs, customer helm
  # without proxy auth) intentionally has no key, and the SDK skips the Secret.
  # See GRO-s3mc.

images:
  pullSecrets: []

image:
  frontend:
    repository: proxy.xyyzx.net/proxy/groovelab/ghcr.io/adamancini/groovelab-frontend
    # tag is empty by default; templates fall back to .Chart.AppVersion (which
    # CI rewrites from the git tag at release time, e.g. v0.1.0). Local
    # overrides via --set image.frontend.tag=dev-local still work.
    tag: ""
    pullPolicy: IfNotPresent
  backend:
    repository: proxy.xyyzx.net/proxy/groovelab/ghcr.io/adamancini/groovelab-backend
    # tag is empty by default; templates fall back to .Chart.AppVersion (which
    # CI rewrites from the git tag at release time, e.g. v0.1.0). Local
    # overrides via --set image.backend.tag=dev-local still work.
    tag: ""
    pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 443
  nodePort: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: groovelab.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

cloudnative-pg:
  enabled: true

cnpg:
  # createCluster controls whether the postgresql.cnpg.io/v1 Cluster resource
  # is created. Set false only when pointing at an external/pre-existing cluster.
  createCluster: true
  instances: 1
  database: groovelab
  owner: groovelab
  password: ""
  storage:
    size: 1Gi

externalDatabase:
  host: ""
  port: 5432
  database: groovelab
  username: groovelab
  password: ""
  existingSecret: ""
  sslMode: "require"

valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "9"
  storage:
    size: 1Gi

cert-manager:
  enabled: true
  installCRDs: true

replicated:
  enabled: true
  fullnameOverride: "groovelab-sdk"

airgap:
  networkPolicy:
    enabled: false

features:
  trackExport:
    # enabled is controlled by the track_export_enabled license entitlement field.
    # Default false; overridden by KOTS HelmChart CR or operator --set flag.
    enabled: "false"

# crdCheck — post-install/post-upgrade Helm hook Job that waits for required
# CRDs (e.g. clusters.postgresql.cnpg.io from the CNPG operator) to be
# Established before downstream operations run. Belt-and-suspenders for
# install-time ordering: helmfile sequences CNPG before groovelab in CI, but
# this hook makes the chart safe under ANY install path (bare `helm install`,
# KOTS, Embedded Cluster).
#
# Disable for airgap / offline installs that pre-establish CRDs out-of-band:
#   --set crdCheck.enabled=false
#
# See chart/README.md "CRD-check post-install hook" and GRO-s3mc.
crdCheck:
  enabled: true
  # Image: NOT bitnami/kubectl (banned per CLAUDE.md). We use `alpine/k8s`
  # because the Job runs a small `/bin/sh` polling loop over multiple CRDs
  # (with logging + per-CRD timeout) — `registry.k8s.io/kubectl` is a
  # distroless-style image with no shell, which fails on `command: [/bin/sh,...]`.
  # `alpine/k8s` is first-party (alpinelinux org, not bitnami), multi-arch,
  # and ships kubectl + busybox shell. Documented in chart/README.md.
  image:
    repository: alpine/k8s
    tag: "1.32.3"
    pullPolicy: IfNotPresent
  # Required CRDs to wait for. Add subchart CRDs here as the chart grows.
  crds:
    - clusters.postgresql.cnpg.io
  # Per-CRD wait timeout (seconds).
  timeout: 60
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
