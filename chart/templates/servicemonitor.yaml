{{- if .Values.serviceMonitor.enabled }}
---
# ServiceMonitor for Prometheus Operator discovery.
# NOTE: the backend must expose a /metrics endpoint (e.g. via
# github.com/prometheus/client_golang/prometheus/promhttp) for this to
# scrape useful data. Without it the target will show as UP but with no
# metrics series.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "groovelab.fullname" . }}-backend
  labels:
    {{- include "groovelab.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    matchLabels:
      {{- include "groovelab.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
{{- end }}
