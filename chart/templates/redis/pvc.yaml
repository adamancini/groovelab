{{- if .Values.valkey.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "groovelab.fullname" . }}-valkey-data
  labels:
    {{- include "groovelab.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.valkey.storage.size | default "1Gi" }}
{{- end }}
