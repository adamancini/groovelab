{{- if .Values.valkey.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "groovelab.fullname" . }}-valkey
  labels:
    {{- include "groovelab.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    {{- include "groovelab.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
{{- end }}
