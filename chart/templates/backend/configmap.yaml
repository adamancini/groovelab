---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "groovelab.fullname" . }}-backend-env
  labels:
    {{- include "groovelab.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  DB_HOST: "{{ include "groovelab.fullname" . }}-postgresql-rw"
  DB_PORT: "5432"
  DATABASE_USER: {{ .Values.cnpg.owner | default "groovelab" | quote }}
  DATABASE_NAME: {{ .Values.cnpg.database | default "groovelab" | quote }}
  REDIS_HOST: "{{ include "groovelab.fullname" . }}-valkey"
  REDIS_PORT: "6379"
  APP_VERSION: {{ .Chart.AppVersion | default "0.1.0" | quote }}
