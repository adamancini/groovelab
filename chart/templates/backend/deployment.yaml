apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "groovelab.fullname" . }}-backend
  labels:
    {{- include "groovelab.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: groovelab
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "groovelab.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "groovelab.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: groovelab
    spec:
      {{- include "groovelab.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-db
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              until nc -zv $DB_HOST $DB_PORT; do
                echo "Waiting for database at $DB_HOST:$DB_PORT..."
                sleep 2
              done
              echo "Database is ready."
          env:
            - name: DB_HOST
              value: "{{ include "groovelab.fullname" . }}-postgresql-rw"
            - name: DB_PORT
              value: "5432"
        - name: db-migrate
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          command:
            - /server
            - migrate
            - /migrations
          env:
            - name: DB_HOST
              value: "{{ include "groovelab.fullname" . }}-postgresql-rw"
            - name: DB_PORT
              value: "5432"
            - name: DATABASE_USER
              value: {{ .Values.cnpg.owner | default "groovelab" | quote }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "groovelab.fullname" . }}-cnpg-credentials
                  key: password
            - name: DATABASE_NAME
              value: {{ .Values.cnpg.database | default "groovelab" | quote }}
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: DB_HOST
              value: "{{ include "groovelab.fullname" . }}-postgresql-rw"
            - name: DB_PORT
              value: "5432"
            - name: DATABASE_USER
              value: {{ .Values.cnpg.owner | default "groovelab" | quote }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "groovelab.fullname" . }}-cnpg-credentials
                  key: password
            - name: DATABASE_NAME
              value: {{ .Values.cnpg.database | default "groovelab" | quote }}
            - name: REDIS_HOST
              value: "{{ include "groovelab.fullname" . }}-valkey"
            - name: REDIS_PORT
              value: "6379"
            - name: APP_VERSION
              value: {{ .Chart.AppVersion | default "0.1.0" | quote }}
            # SESSION_DURATION/MAX_CARDS_PER_SESSION/GUEST_ACCESS_ENABLED are
            # populated from KOTS Config items (auth.sessionDuration,
            # flashcards.maxCardsPerSession, auth.guestAccess) via
            # release/helmchart.yaml. Plain-helm installs use chart defaults.
            # See GRO-7uiw.
            - name: SESSION_DURATION
              value: {{ .Values.auth.sessionDuration | default "24h" | quote }}
            - name: MAX_CARDS_PER_SESSION
              value: {{ .Values.flashcards.maxCardsPerSession | default 20 | quote }}
            - name: GUEST_ACCESS_ENABLED
              value: {{ .Values.auth.guestAccess | default true | quote }}
