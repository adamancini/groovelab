---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "groovelab.fullname" . }}-backend
  labels:
    {{- include "groovelab.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: groovelab
spec:
  replicas: {{ .Values.appReplicas.backend }}
  selector:
    matchLabels:
      {{- include "groovelab.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "groovelab.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: groovelab
    spec:
      {{- include "groovelab.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "groovelab.podSecurityContext" . | nindent 8 }}
      initContainers:
        - name: wait-for-db
          image: '{{ include "groovelab.imageRef" (dict "registry" .Values.initContainers.waitForDb.image.registry "repository" .Values.initContainers.waitForDb.image.repository "tag" .Values.initContainers.waitForDb.image.tag) }}'
          securityContext:
            {{- include "groovelab.containerSecurityContext" . | nindent 12 }}
          command:
            - sh
            - -c
            - |
              until nc -zv $DB_HOST $DB_PORT; do
                echo "Waiting for database at $DB_HOST:$DB_PORT..."
                sleep 2
              done
              echo "Database is ready."
          resources:
            {{- toYaml .Values.resources.initContainers.waitForDb | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "groovelab.fullname" . }}-backend-env
          volumeMounts:
            {{- include "groovelab.emptyDirVolumeMounts" . | nindent 12 }}
        - name: db-migrate
          image: '{{ include "groovelab.imageRef" (dict "registry" .Values.image.backend.registry "repository" .Values.image.backend.repository "tag" (.Values.image.backend.tag | default .Chart.AppVersion)) }}'
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          securityContext:
            {{- include "groovelab.containerSecurityContext" . | nindent 12 }}
          command:
            - /server
            - migrate
            - /migrations
          resources:
            {{- toYaml .Values.resources.initContainers.dbMigrate | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "groovelab.fullname" . }}-backend-env
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "groovelab.fullname" . }}-cnpg-credentials
                  key: password
          volumeMounts:
            {{- include "groovelab.emptyDirVolumeMounts" . | nindent 12 }}
      containers:
        - name: backend
          image: '{{ include "groovelab.imageRef" (dict "registry" .Values.image.backend.registry "repository" .Values.image.backend.repository "tag" (.Values.image.backend.tag | default .Chart.AppVersion)) }}'
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          securityContext:
            {{- include "groovelab.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "groovelab.fullname" . }}-backend-env
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "groovelab.fullname" . }}-cnpg-credentials
                  key: password
          volumeMounts:
            {{- include "groovelab.emptyDirVolumeMounts" . | nindent 12 }}
      volumes:
        {{- include "groovelab.emptyDirVolumes" . | nindent 8 }}
