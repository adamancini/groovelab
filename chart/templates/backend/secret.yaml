{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-db-credentials" (include "groovelab.fullname" .)) -}}
{{- $password := "" -}}
{{- if $existing -}}
{{- $password = index $existing.data "password" | b64dec -}}
{{- else -}}
{{- $password = randAlphaNum 20 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "groovelab.fullname" . }}-db-credentials
  labels:
    {{- include "groovelab.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: groovelab
type: Opaque
data:
  password: {{ $password | b64enc | quote }}
