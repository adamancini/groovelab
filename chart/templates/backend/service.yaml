---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "groovelab.fullname" . }}-backend
  labels:
    {{- include "groovelab.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: groovelab
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "groovelab.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
