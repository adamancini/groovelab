{{- if .Values.cnpg.createCluster }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-cnpg-credentials" (include "groovelab.fullname" .)) -}}
{{- $password := "" -}}
{{- if $existing -}}
{{- $password = index $existing.data "password" | b64dec -}}
{{- else if .Values.cnpg.password -}}
{{- $password = .Values.cnpg.password -}}
{{- else -}}
{{- $password = randAlphaNum 20 -}}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "groovelab.fullname" . }}-cnpg-credentials
  labels:
    {{- include "groovelab.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
data:
  username: {{ .Values.cnpg.owner | default "groovelab" | b64enc | quote }}
  password: {{ $password | b64enc | quote }}
{{- end }}
