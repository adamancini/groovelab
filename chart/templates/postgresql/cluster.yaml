{{- if index .Values "cloudnative-pg" "enabled" }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "groovelab.fullname" . }}-postgresql
  labels:
    {{- include "groovelab.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.cnpg.instances | default 1 }}
  bootstrap:
    initdb:
      database: {{ .Values.cnpg.database | default "groovelab" }}
      owner: {{ .Values.cnpg.owner | default "groovelab" }}
      secret:
        name: {{ include "groovelab.fullname" . }}-cnpg-credentials
  storage:
    size: {{ .Values.cnpg.storage.size | default "1Gi" }}
{{- end }}
