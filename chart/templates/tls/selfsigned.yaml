{{- if and .Values.ingress.enabled (eq .Values.tls.mode "self-signed") }}
---
# Self-signed TLS certificate generated by Helm at install time.
# Suitable for testing and air-gap installs. Not recommended for production.
{{- $tlsHost := "groovelab.local" -}}
{{- if .Values.ingress.hosts }}
{{- $tlsHost = (index .Values.ingress.hosts 0).host -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "groovelab.fullname" . }}-tls
  labels:
    {{- include "groovelab.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ include "groovelab.genSelfSignedCert" (dict "host" $tlsHost) | b64enc | quote }}
  tls.key: {{ include "groovelab.genSelfSignedKey" (dict "host" $tlsHost) | b64enc | quote }}
{{- end }}
