apiVersion: v2
name: groovelab
description: Browser-based music theory learning and practice application for bassists
type: application
version: 0.1.1
# appVersion carries the "v" prefix to match the GHCR image tag the Release
# workflow pushes. Templates use `.Values.image.<side>.tag | default .Chart.AppVersion`,
# so this is the source of truth for the deployed image. CI rewrites both
# `version` and `appVersion` in-place from ${GITHUB_REF_NAME} before
# `replicated release create`; see chart/README.md for the invariant.
appVersion: "v0.1.1"
dependencies:
  - name: cloudnative-pg
    version: "0.28.0"
    repository: https://cloudnative-pg.github.io/charts
    condition: cloudnative-pg.enabled
  - name: cert-manager
    version: "1.x.x"
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled
  - name: replicated
    version: "1.x.x"
    repository: oci://registry.replicated.com/library
    condition: replicated.enabled
