apiVersion: v2
name: groovelab
description: Browser-based music theory learning and practice application for bassists
type: application
version: 0.1.10
# appVersion matches the GHCR image tag the Release workflow pushes.
# Templates use `.Values.image.<side>.tag | default .Chart.AppVersion`,
# so this is the source of truth for the deployed image. CI rewrites both
# `version` and `appVersion` in-place from ${GITHUB_REF_NAME#v} before
# `replicated release create`; see chart/README.md for the invariant.
appVersion: "0.1.10"
dependencies:
  - name: cloudnative-pg
    version: "0.28.2"
    repository: https://cloudnative-pg.github.io/charts
    condition: cloudnative-pg.enabled
  - name: cert-manager
    # Pinned to the 1.19.x line: customer clusters run 1.19.4, and cert-manager
    # 1.20 moved `networkPolicy.enabled` from top-level to
    # `webhook.networkPolicy.enabled`. Crossing that schema break must be a
    # deliberate, tested upgrade story — not an implicit `helm dep update` side
    # effect. See chart/README.md "cert-manager version pin rationale" and
    # nd bug GRO-k6de for context.
    version: ">=1.19.0,<1.20.0"
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled
  - name: replicated
    version: "1.x.x"
    repository: oci://registry.replicated.com/library
    condition: replicated.enabled
