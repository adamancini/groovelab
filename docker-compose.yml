services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: groovelab
      POSTGRES_PASSWORD: groovelab
      POSTGRES_DB: groovelab
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groovelab"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: golang:1.25-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DATABASE_HOST: postgres
      DATABASE_USER: groovelab
      DATABASE_PASSWORD: groovelab
      DATABASE_NAME: groovelab
    command: go run ./cmd/server migrate /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
