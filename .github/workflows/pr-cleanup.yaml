name: PR Cleanup

# Tears down per-PR resources when a PR is closed or merged:
#   1. Delete the per-PR namespace `groovelab-pr-<slug>` from the shared
#      `groovelab-ci` CMX cluster (GRO-e4wb).
#   2. Archive the per-PR trial customer.
#   3. Demote and archive the per-PR channel.
#
# GRO-e4wb: the shared `groovelab-ci` cluster is intentionally NOT removed
# by this workflow. It persists for 24h so subsequent PR runs (same PR
# re-runs or parallel PRs) skip the ~2-3 min cluster-provisioning cost.
# The cluster auto-evicts via CMX TTL; the next PR run after eviction
# provisions a new one lazily.
#
# Slug normalization MUST match .github/workflows/pr.yaml step 1 exactly —
# see GRO-lcva. If you edit the algorithm there, mirror it here.
#
# Secrets:
#   - REPLICATED_API_TOKEN: required for `customer archive` and `channel rm`.
#   - REPLICATED_ADMIN_TOKEN: optional fallback for `channel demote` if the
#     regular API token lacks that permission.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  cleanup:
    name: Archive per-PR Replicated resources
    runs-on: ubuntu-latest
    env:
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
      APP_SLUG: groovelab
    steps:
      # Need the repo on disk to source scripts/replicated-slug.sh.
      - name: Checkout
        uses: actions/checkout@v4

      # GRO-mf1d: pinned, deduplicated install via local composite action
      # (.github/actions/setup-replicated-cli). The previous inline pattern
      # called api.github.com/.../releases/latest, which was rate-limited and
      # silently chased the newest CLI release.
      - name: Install Replicated CLI
        uses: ./.github/actions/setup-replicated-cli

      # Slug normalization — keep in lockstep with pr.yaml step 1.
      # HEAD_REF is attacker-controlled; pass via env to avoid injection.
      - name: Compute slug
        id: slug
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Slug normalization sourced from scripts/replicated-slug.sh —
          # single source of truth shared with pr.yaml and the local
          # Makefile (`make pr-slug`). See GRO-m1bc.
          # shellcheck source=../../scripts/replicated-slug.sh
          source "${GITHUB_WORKSPACE}/scripts/replicated-slug.sh"
          BRANCH="$HEAD_REF"
          SLUG=$(normalize-slug "$BRANCH")
          if [ -z "$SLUG" ]; then
            SLUG="pr-${PR_NUMBER}"
          fi
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "Slug to clean up: ${SLUG}"

      # GRO-e4wb: delete the per-PR namespace from the shared `groovelab-ci`
      # cluster. We tolerate every "not found" outcome — the cluster may
      # have TTL'd between the last PR run and PR-close, in which case
      # there's nothing to delete and that's fine.
      #
      # The `replicated cluster kubeconfig` invocation requires the cluster
      # ID, so we look it up by name first. If no running cluster is found,
      # skip namespace cleanup entirely (the namespace died with the
      # cluster).
      - name: Delete per-PR namespace from shared cluster
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          CLUSTER_NAME="groovelab-ci"
          NAMESPACE="groovelab-pr-${SLUG}"
          NAMESPACE="${NAMESPACE:0:63}"
          NAMESPACE="${NAMESPACE%-}"
          CLUSTER_ID=$(replicated cluster ls --output json \
            | jq -r --arg n "$CLUSTER_NAME" \
                '[.[] | select(.name == $n and .status == "running")][0].id // empty')
          if [ -z "$CLUSTER_ID" ]; then
            echo "No running ${CLUSTER_NAME} cluster — namespace ${NAMESPACE} already gone with it."
            exit 0
          fi
          echo "[$(date +%H:%M:%S)] Fetching kubeconfig for ${CLUSTER_NAME} (ID: ${CLUSTER_ID})"
          KUBECONFIG_FILE="${RUNNER_TEMP}/cleanup-kubeconfig.yaml"
          replicated cluster kubeconfig "$CLUSTER_ID" \
            --app "${APP_SLUG}" \
            --output-path "$KUBECONFIG_FILE"
          export KUBECONFIG="$KUBECONFIG_FILE"
          # `--ignore-not-found` is the idempotent path: re-running cleanup
          # after a successful delete is a no-op. `--wait=false` returns
          # immediately so we don't block the cleanup workflow on namespace
          # finalizers; the per-PR namespace only owns this PR's helm
          # release + secrets, which terminate quickly.
          echo "[$(date +%H:%M:%S)] kubectl delete namespace ${NAMESPACE} --ignore-not-found"
          kubectl delete namespace "$NAMESPACE" \
            --ignore-not-found \
            --wait=false || true
          echo "Namespace ${NAMESPACE} delete requested."

      # Archive the trial customer if it still exists. `customer archive` is
      # the idempotent tear-down verb; `customer delete` may not be available
      # on all plans. Failure is tolerated — the 24h trial expiry covers it.
      - name: Archive trial customer
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          CUSTOMER_NAME="pr-${SLUG}"
          CUSTOMER_ID=$(replicated customer ls --app "${APP_SLUG}" --output json \
            | jq -r --arg n "$CUSTOMER_NAME" '.[] | select(.name == $n) | .id // empty')
          if [ -z "$CUSTOMER_ID" ]; then
            echo "No customer named ${CUSTOMER_NAME} — nothing to archive."
            exit 0
          fi
          echo "Archiving customer ${CUSTOMER_NAME} (ID: ${CUSTOMER_ID})"
          replicated customer archive "$CUSTOMER_ID" --app "${APP_SLUG}" || true

      # Demote any releases on the channel, then archive the channel.
      # `channel demote` may require REPLICATED_ADMIN_TOKEN — swallow errors
      # and fall through to `channel rm` which handles the common case.
      - name: Demote and archive per-PR channel
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          REPLICATED_ADMIN_TOKEN: ${{ secrets.REPLICATED_ADMIN_TOKEN }}
        run: |
          CHANNEL_ID=$(replicated channel ls --app "${APP_SLUG}" --output json \
            | jq -r --arg n "$SLUG" '.[] | select(.name == $n) | .id // empty')
          if [ -z "$CHANNEL_ID" ]; then
            echo "No channel named ${SLUG} — nothing to archive."
            exit 0
          fi

          if [ -n "${REPLICATED_ADMIN_TOKEN:-}" ]; then
            echo "Using REPLICATED_ADMIN_TOKEN for channel demote."
            REPLICATED_API_TOKEN_BAK="$REPLICATED_API_TOKEN"
            export REPLICATED_API_TOKEN="$REPLICATED_ADMIN_TOKEN"
          fi

          RELEASES=$(replicated release ls --app "${APP_SLUG}" --output json 2>/dev/null \
            | jq -r --arg c "$SLUG" '.[] | select(.activeChannels[]?.name == $c) | .sequence' 2>/dev/null || true)
          for SEQ in $RELEASES; do
            echo "Demoting release sequence ${SEQ} on channel ${SLUG}"
            replicated release demote "$SEQ" "$CHANNEL_ID" --app "${APP_SLUG}" || true
          done

          if [ -n "${REPLICATED_API_TOKEN_BAK:-}" ]; then
            export REPLICATED_API_TOKEN="$REPLICATED_API_TOKEN_BAK"
          fi

          echo "Archiving channel ${SLUG} (ID: ${CHANNEL_ID})"
          replicated channel rm "$CHANNEL_ID" --app "${APP_SLUG}" || true
