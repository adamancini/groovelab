name: Release

# Tag-triggered. Pushing a `v*` tag builds signed images and creates a
# Replicated release directly on the Stable channel, behind a GitHub
# Environment approval gate ("production").
#
# Rationale: main is continuously released to Unstable by branch-push.yaml
# and PR merges are gated by pr.yaml (which installs on CMX and runs a
# smoke test). By the time we cut a tag, we've already validated the code.
# The Stable promotion becomes a single deliberate action: push a tag,
# approve the deployment, release goes live.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write # Cosign keyless via GitHub OIDC

env:
  GHCR_PREFIX: ghcr.io/adamancini
  APP_SLUG: groovelab

jobs:
  # ── Build, sign, push ────────────────────────────────────────────────────
  build-sign:
    name: Build, Push, Sign
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      frontend-digest: ${{ steps.build-frontend.outputs.digest }}
      backend-digest: ${{ steps.build-backend.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version from tag
        id: meta
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "version=${REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "::notice::Release version ${REF_NAME}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend/
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GHCR_PREFIX }}/groovelab-frontend:${{ steps.meta.outputs.version }}
            ${{ env.GHCR_PREFIX }}/groovelab-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: backend/
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GHCR_PREFIX }}/groovelab-backend:${{ steps.meta.outputs.version }}
            ${{ env.GHCR_PREFIX }}/groovelab-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign frontend image
        env:
          IMAGE_REF: ${{ env.GHCR_PREFIX }}/groovelab-frontend@${{ steps.build-frontend.outputs.digest }}
        run: cosign sign --yes "$IMAGE_REF"

      - name: Sign backend image
        env:
          IMAGE_REF: ${{ env.GHCR_PREFIX }}/groovelab-backend@${{ steps.build-backend.outputs.digest }}
        run: cosign sign --yes "$IMAGE_REF"

  # ── Create release on Stable (gated by environment approval) ────────────
  release-stable:
    name: Release to Stable
    runs-on: ubuntu-latest
    needs: build-sign
    # Configure the "production" environment in repo Settings > Environments
    # with required reviewers. The release waits on manual approval before
    # running the promote step.
    environment: production
    env:
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
      VERSION: ${{ needs.build-sign.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "4.1.4"

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL \
            | tar xz -C /usr/local/bin replicated

      - name: Install yq
        run: |
          sudo curl -sL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Patch chart image tags to match the tagged release
        run: |
          yq -i ".image.frontend.tag = \"$VERSION\"" chart/values.yaml
          yq -i ".image.backend.tag = \"$VERSION\"" chart/values.yaml
          echo "Patched image tags:"
          yq '.image' chart/values.yaml

      - name: Package chart dependencies
        run: |
          helm dependency update chart/
          cd chart/charts && for f in *.tgz; do
            [ -f "$f" ] && [ ! -d "${f%.tgz}" ] && tar xzf "$f" || true
          done

      - name: Create release on Stable
        run: |
          replicated release create \
            --yaml-dir chart/ \
            --promote Stable \
            --version "$VERSION" \
            --app "$APP_SLUG"
          echo "::notice::Released $VERSION to Stable."
          echo "::notice::Vendor Portal notification (Settings > Notifications) will fire on promotion."

      - name: Cosign verification hint
        env:
          GHCR_PREFIX: ${{ env.GHCR_PREFIX }}
        run: |
          cat <<EOF
          ================================================================
          To verify this Stable release's image signatures:

            cosign verify \\
              --certificate-identity-regexp='https://github.com/adamancini/groovelab/' \\
              --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \\
              ${GHCR_PREFIX}/groovelab-frontend:${VERSION}

            cosign verify \\
              --certificate-identity-regexp='https://github.com/adamancini/groovelab/' \\
              --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \\
              ${GHCR_PREFIX}/groovelab-backend:${VERSION}
          ================================================================
          EOF
