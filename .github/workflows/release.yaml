name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write  # Required for Cosign keyless signing via OIDC

env:
  GHCR_PREFIX: ghcr.io/adamancini
  APP_SLUG: groovelab
  HELM_VERSION: "4.1.4"
  K3S_VERSION: "1.34"

jobs:
  # ── Build, Push, and Sign Images (matrix: frontend || backend) ───────────
  # GRO-fuxa: split serial frontend+backend build into a 2-leg matrix so they
  # run in parallel runners. Mirrors the pr.yaml refactor. Each leg keeps
  # its own buildx cache scope (GRO-i987).
  build-sign:
    name: Build, Push, and Sign (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # cosign keyless signing via OIDC (per-leg)
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, backend]
    steps:
      # GRO-qrdt: per-job wall-clock timing.
      - name: Record job start
        id: job_start
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute version from tag
        id: meta
        run: |
          # Extract version from tag (e.g., v1.2.3 -> v1.2.3)
          VERSION="${GITHUB_REF_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Per-image cache scope (GRO-i987) preserved under matrix.
      - name: Build and push ${{ matrix.service }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.service }}/
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GHCR_PREFIX }}/groovelab-${{ matrix.service }}:${{ steps.meta.outputs.version }}
            ${{ env.GHCR_PREFIX }}/groovelab-${{ matrix.service }}:latest
          # GRO-n9bk: registry-backed buildx cache (mirrors pr.yaml). Branch-
          # independent and not subject to GHA's 10GB-per-repo cache eviction.
          # Per-image ref keeps frontend/backend caches independent.
          cache-from: |
            type=registry,ref=${{ env.GHCR_PREFIX }}/groovelab-${{ matrix.service }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.GHCR_PREFIX }}/groovelab-${{ matrix.service }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign ${{ matrix.service }} image
        run: |
          cosign sign --yes \
            "${{ env.GHCR_PREFIX }}/groovelab-${{ matrix.service }}@${{ steps.build.outputs.digest }}"

      # GRO-qrdt: per-job wall-clock timing summary (per matrix leg).
      - name: Job timing summary
        if: always()
        env:
          JOB_NAME: ${{ github.job }} (${{ matrix.service }})
          RUNNER_OS: ${{ runner.os }}
          JOB_START: ${{ steps.job_start.outputs.epoch }}
        run: |
          set +e
          END=$(date +%s)
          if [ -z "$JOB_START" ] || ! [ "$JOB_START" -eq "$JOB_START" ] 2>/dev/null; then
            DUR_HUMAN="unknown"
            START_ISO="unknown"
            END_ISO="unknown"
          else
            DUR=$((END - JOB_START))
            MIN=$((DUR / 60))
            SEC=$((DUR % 60))
            DUR_HUMAN="${MIN}m ${SEC}s (${DUR}s)"
            START_ISO=$(date -u -d "@${JOB_START}" --iso-8601=seconds 2>/dev/null || echo "unknown")
            END_ISO=$(date -u -d "@${END}" --iso-8601=seconds 2>/dev/null || echo "unknown")
          fi
          {
            echo "### Job timing: ${JOB_NAME}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Duration | ${DUR_HUMAN} |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Start | ${START_ISO} |"
            echo "| End | ${END_ISO} |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  # ── Build-Sign Collector (output aggregation for matrix) ─────────────────
  # GRO-fuxa: matrix-job outputs aren't directly addressable as
  # `needs.build-sign.outputs.*`. The collector depends on both matrix legs
  # (so it only runs when both succeed) and re-emits the workflow-scoped
  # `version` output that downstream `release-unstable` and `promote-stable`
  # consume. Version is just GITHUB_REF_NAME (the pushed tag), so we
  # recompute deterministically here.
  build-sign-collect:
    name: Collect build-sign outputs
    runs-on: ubuntu-latest
    needs: build-sign
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Compute version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

  # ── Release to Unstable and Test ─────────────────────────────────────────
  release-unstable:
    name: Release to Unstable and Test
    runs-on: ubuntu-latest
    # GRO-fuxa: build-sign is now matrix; consume version from the collector.
    # build-sign is also in `needs:` so this job still gates on both legs.
    needs: [build-sign, build-sign-collect]
    env:
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
      VERSION: ${{ needs.build-sign-collect.outputs.version }}
    outputs:
      release-sequence: ${{ steps.release.outputs.sequence }}
    steps:
      - name: Record job start
        id: job_start
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      # GRO-sm7y: cache resolved subchart tarballs keyed on Chart.lock hash.
      # Mirrors pr.yaml helm-lint and cmx-test caches. `Package chart into
      # release/` and `Install CNPG operator` both run `helm dependency
      # update chart/`; on cache hit the subchart tarballs are already on
      # disk so the dep-update is a no-op (~10-30s saved per run when
      # Chart.lock is unchanged).
      - name: Cache helm chart deps
        uses: actions/cache@v5
        with:
          path: chart/charts
          key: helm-deps-${{ runner.os }}-${{ hashFiles('chart/Chart.lock') }}
          restore-keys: |
            helm-deps-${{ runner.os }}-

      # GRO-uqtg: single point-of-truth for chart-dep resolution in this job.
      # Previously each step that needed extracted subcharts called
      # `helm dependency update chart/` itself, which re-ran registry lookups
      # and re-downloaded tarballs ~10-20s per invocation. Consolidating here
      # means downstream steps (Package chart, Install CNPG operator,
      # Install/Upgrade test) can rely on `chart/charts/*.tgz` AND
      # `chart/charts/<dep>/` already existing.
      - name: Resolve chart dependencies
        run: |
          helm dependency update chart/
          # Helm v4 requires extracted subchart directories for downstream
          # install/template operations. Extract tarballs once here so
          # downstream steps can rely on both the tarball and the directory
          # being present.
          cd chart/charts
          for f in *.tgz; do
            [ -f "$f" ] || continue
            DIR="${f%.tgz}"
            if [ ! -d "$DIR" ]; then
              tar xzf "$f"
            fi
          done
          cd ../..
          echo "Chart dependencies resolved:"
          ls -la chart/charts/

      # GRO-mf1d: pinned, deduplicated install via local composite action
      # (.github/actions/setup-replicated-cli). The previous inline pattern
      # called api.github.com/.../releases/latest, which was rate-limited and
      # silently chased the newest CLI release.
      - name: Install Replicated CLI
        uses: ./.github/actions/setup-replicated-cli

      - name: Sync Chart.yaml version to tag
        # Rewrites chart/Chart.yaml so `version` matches the tag without its
        # leading `v` (Helm SemVer requirement) and `appVersion` matches the
        # raw tag (which is also the GHCR image tag). Templates fall back to
        # .Chart.AppVersion when image.<side>.tag is empty, so this single
        # rewrite wires the entire chart to the just-built images.
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          CHART_VERSION="${VERSION#v}"           # e.g. 0.1.0 (Helm SemVer)
          APP_VERSION="${VERSION}"               # e.g. v0.1.0 (matches GHCR image tag)
          yq -i ".version = \"${CHART_VERSION}\"" chart/Chart.yaml
          yq -i ".appVersion = \"${APP_VERSION}\"" chart/Chart.yaml
          echo "Chart.yaml synced:"
          grep -E "^(version|appVersion):" chart/Chart.yaml

      - name: Sync release/helmchart.yaml chartVersion to tag
        # release/helmchart.yaml is a KOTS HelmChart CR whose
        # .spec.chart.chartVersion must match the packaged chart's semver
        # (chart/Chart.yaml.version). If this drifts, KOTS cannot resolve
        # the chart inside the release. Same rewrite pattern as Chart.yaml.
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          CHART_VERSION="${VERSION#v}"
          yq -i ".spec.chart.chartVersion = \"${CHART_VERSION}\"" release/helmchart.yaml
          echo "release/helmchart.yaml synced:"
          grep -E "chartVersion:" release/helmchart.yaml

      - name: Package chart into release/
        # Fixes GRO-kydk: `replicated release create --yaml-dir chart/`
        # silently drops `.tpl` files (_helpers.tpl, NOTES.txt), producing
        # uninstallable releases. `helm package` preserves all files. We
        # drop the packaged tarball INTO release/ alongside the KOTS CRs,
        # so a single `--yaml-dir release/` picks up both.
        #
        # Note: the `replicated` CLI treats `--yaml-dir` and `--chart` as
        # mutually exclusive (tested with v0.124.5). Co-locating the tgz
        # inside the release dir is the canonical way to combine chart +
        # KOTS manifests in one invocation.
        id: package
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          # GRO-uqtg: chart deps are resolved once in the upstream "Resolve
          # chart dependencies" step. No need to re-run `helm dependency
          # update` here.
          CHART_VERSION="${VERSION#v}"
          helm package chart/ \
            --destination release/ \
            --version "${CHART_VERSION}" \
            --app-version "${VERSION}"
          CHART_TGZ="release/groovelab-${CHART_VERSION}.tgz"
          echo "chart_tgz=${CHART_TGZ}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${CHART_TGZ}"
          echo "Verifying helpers and NOTES preserved in packaged chart..."
          tar tzf "${CHART_TGZ}" | grep -E '(_helpers\.tpl|NOTES\.txt)$' || {
            echo "FAIL: packaged chart missing _helpers.tpl or NOTES.txt"
            exit 1
          }
          echo "release/ contents for Replicated:"
          ls -la release/

      - name: Create release on Unstable
        # Replicated release: single `--yaml-dir release/` picks up both
        # the packaged chart tarball (helpers preserved) and the KOTS CRs
        # (Application, HelmChart, EC Config). Replaces the previous
        # `--yaml-dir chart/` flow that stripped .tpl files. See
        # GRO-zkhp / GRO-kydk for context.
        #
        # GRO-5ugn: extract the sequence via `-o json | jq -r .sequence`
        # rather than parsing the tabular output with awk. The table
        # prepends a Unicode bullet (`.`) to each data row, which the
        # previous `awk '{print $1}'` captured verbatim, producing a
        # non-numeric SEQUENCE that broke the downstream `promote-stable`
        # call (`Error: Failed to parse sequence argument`). Structured
        # JSON output (`--output json`) is supported on
        # `replicated release create` in v0.124.5 and returns
        # `{"sequence": <int>, ...}`. `jq` is pre-installed on
        # ubuntu-latest runners.
        id: release
        run: |
          RELEASE_JSON=$(replicated release create \
            --yaml-dir release/ \
            --promote Unstable \
            --version "${{ env.VERSION }}" \
            --app "${{ env.APP_SLUG }}" \
            --output json)
          echo "$RELEASE_JSON"

          # Extract sequence number for later promotion. Validate that
          # the JSON-parsed value is numeric before exporting it to the
          # downstream job so a schema change surfaces here instead of
          # as an opaque "Failed to parse sequence argument" in
          # promote-stable.
          SEQUENCE=$(echo "$RELEASE_JSON" | jq -r '.sequence')
          if ! [[ "$SEQUENCE" =~ ^[0-9]+$ ]]; then
            echo "FAIL: extracted SEQUENCE is not a positive integer: '${SEQUENCE}'"
            echo "Raw release-create output:"
            echo "$RELEASE_JSON"
            exit 1
          fi
          echo "sequence=${SEQUENCE}" >> "$GITHUB_OUTPUT"
          echo "Release created: ${{ env.VERSION }} (sequence: ${SEQUENCE})"

      - name: Provision CMX k3s cluster for install test
        id: cluster
        run: |
          CLUSTER_OUTPUT=$(replicated cluster create \
            --distribution k3s \
            --version "${{ env.K3S_VERSION }}" \
            --name "release-${{ env.VERSION }}" \
            --ttl 1h \
            --wait 5m \
            --app "${{ env.APP_SLUG }}")
          CLUSTER_ID=$(echo "$CLUSTER_OUTPUT" | awk 'NR==2 {print $1}')
          echo "id=${CLUSTER_ID}" >> "$GITHUB_OUTPUT"
          echo "Cluster provisioned: ${CLUSTER_ID}"

      - name: Export kubeconfig
        run: |
          replicated cluster kubeconfig "${{ steps.cluster.outputs.id }}" \
            --app "${{ env.APP_SLUG }}" \
            --output-path "${{ runner.temp }}/kubeconfig.yaml"
          echo "KUBECONFIG=${{ runner.temp }}/kubeconfig.yaml" >> "$GITHUB_ENV"

      - name: Install CNPG operator
        run: |
          # GRO-uqtg: chart deps + tarball extraction happen once in the
          # upstream "Resolve chart dependencies" step. `chart/charts/cloudnative-pg/`
          # is already present here.
          helm install cnpg-operator chart/charts/cloudnative-pg \
            --namespace cnpg-system --create-namespace \
            --wait --timeout 3m

      - name: Create namespace and prerequisites
        run: |
          NAMESPACE=groovelab
          kubectl create namespace "$NAMESPACE"

          # Label + annotate the Secret with Helm ownership metadata so
          # the subsequent `helm install groovelab` step adopts this
          # pre-applied Secret instead of failing with:
          #   "invalid ownership metadata; missing key
          #    \"app.kubernetes.io/managed-by\": must be set to \"Helm\""
          # The CNPG Cluster bootstrap (below) requires this Secret to
          # exist before `helm install` runs, so we pre-apply it and tag
          # it for Helm adoption. See GRO-ln26.
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: groovelab-cnpg-credentials
            namespace: ${NAMESPACE}
            labels:
              app.kubernetes.io/managed-by: Helm
            annotations:
              meta.helm.sh/release-name: groovelab
              meta.helm.sh/release-namespace: groovelab
          type: kubernetes.io/basic-auth
          stringData:
            username: groovelab
            password: ci-test-password
          EOF

          # Same Helm-adoption metadata as the Secret above. The chart
          # also renders a CNPG Cluster named `groovelab-postgresql` (see
          # chart/templates/postgresql/cluster.yaml, gated on
          # .Values.cnpg.createCluster which defaults to true). Pre-apply
          # it here so `kubectl wait --for=condition=Ready` can gate the
          # install on a healthy DB, then let `helm install` adopt it.
          kubectl apply -f - <<EOF
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: groovelab-postgresql
            namespace: ${NAMESPACE}
            labels:
              app.kubernetes.io/managed-by: Helm
            annotations:
              meta.helm.sh/release-name: groovelab
              meta.helm.sh/release-namespace: groovelab
          spec:
            instances: 1
            bootstrap:
              initdb:
                database: groovelab
                owner: groovelab
                secret:
                  name: groovelab-cnpg-credentials
            storage:
              size: 1Gi
          EOF

          echo "Waiting for CNPG Cluster to become ready..."
          kubectl wait --for=condition=Ready cluster/groovelab-postgresql \
            -n "${NAMESPACE}" --timeout=5m

          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: groovelab-postgresql
            namespace: ${NAMESPACE}
          spec:
            type: ExternalName
            externalName: groovelab-postgresql-rw.${NAMESPACE}.svc.cluster.local
            ports:
              - port: 5432
                targetPort: 5432
          EOF

          kubectl create secret docker-registry ghcr-credentials \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --namespace "$NAMESPACE"

      - name: Install test (fresh install)
        run: |
          NAMESPACE=groovelab
          # GRO-uqtg: chart deps + tarball extraction handled once in the
          # upstream "Resolve chart dependencies" step.

          # NOTE: image tags intentionally NOT overridden. The chart must
          # resolve them from `.Chart.AppVersion` (which the Sync Chart.yaml
          # step above set to ${VERSION}). If this install works, the chart
          # is correctly wired. Only the repository is overridden here, to
          # pull directly from GHCR (the proxy registry is only reachable
          # from EC / KOTS-managed clusters, not this ephemeral CMX k3s).
          #
          # Replicated-by-default carve-out (GRO-m1em): this is the one
          # sanctioned install path that flips `replicated.enabled=false`.
          # The CMX k3s cluster is unlicensed (CI-internal smoke harness,
          # not a customer install), so it cannot pull from the Replicated
          # proxy registry and the SDK subchart has no license secret to
          # consume. This smoke test exists only to prove the chart packs
          # and installs; the CUSTOMER-GRADE install path (with
          # replicated.enabled=true, proxy registry, enterprise-pull-secret)
          # lives in .github/workflows/pr.yaml (GRO-lcva). Do not copy this
          # pattern into any other install path without a matching
          # justification comment. See chart/README.md
          # "Replicated-enabled by default" for the full invariant.
          helm install groovelab chart/ \
            --namespace "$NAMESPACE" \
            --set image.frontend.repository="${{ env.GHCR_PREFIX }}/groovelab-frontend" \
            --set image.backend.repository="${{ env.GHCR_PREFIX }}/groovelab-backend" \
            --set 'global.imagePullSecrets[0].name=ghcr-credentials' \
            --set global.replicated.dockerconfigjson=null \
            --set cert-manager.enabled=false \
            --set cloudnative-pg.enabled=false \
            --set replicated.enabled=false

      - name: Wait for pods to be ready
        run: |
          NAMESPACE=groovelab
          DEADLINE=$(($(date +%s) + 300))
          while true; do
            echo "[$(date +%H:%M:%S)] Pod status:"
            kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null || true
            NOT_READY=$(kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null \
              | grep -v -E "Running|Completed" || true)
            [ -z "$NOT_READY" ] && break
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "TIMEOUT: pods not ready after 5 minutes"
              kubectl describe pods -n "$NAMESPACE" 2>/dev/null | tail -60
              exit 1
            fi
            sleep 15
          done
          echo "All pods running."

      - name: Verify /healthz returns 200 (install test)
        run: |
          NAMESPACE=groovelab
          kubectl port-forward svc/groovelab-backend 18080:8080 -n "$NAMESPACE" &
          PF_PID=$!
          sleep 5

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18080/healthz)
          kill "$PF_PID" 2>/dev/null || true

          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: /healthz returned HTTP ${HTTP_CODE}, expected 200"
            exit 1
          fi
          echo "PASS: install test /healthz returned HTTP 200"

      - name: Upgrade test (helm upgrade in-place)
        run: |
          NAMESPACE=groovelab
          # Re-run helm upgrade with same version to validate upgrade path.
          # Image tags intentionally NOT overridden -- same reasoning as the
          # install step above (.Chart.AppVersion is the source of truth).
          #
          # Replicated-by-default carve-out (GRO-m1em): same as the install
          # step above, this upgrade runs on an unlicensed CMX k3s cluster
          # and therefore flips `replicated.enabled=false` to skip the SDK
          # subchart. Customer-grade upgrade coverage (replicated.enabled=true
          # end-to-end) is the PR workflow's responsibility (GRO-lcva). See
          # chart/README.md "Replicated-enabled by default" for the invariant.
          helm upgrade groovelab chart/ \
            --namespace "$NAMESPACE" \
            --set image.frontend.repository="${{ env.GHCR_PREFIX }}/groovelab-frontend" \
            --set image.backend.repository="${{ env.GHCR_PREFIX }}/groovelab-backend" \
            --set 'global.imagePullSecrets[0].name=ghcr-credentials' \
            --set global.replicated.dockerconfigjson=null \
            --set cert-manager.enabled=false \
            --set cloudnative-pg.enabled=false \
            --set replicated.enabled=false

          # Wait for rollout
          DEADLINE=$(($(date +%s) + 300))
          while true; do
            NOT_READY=$(kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null \
              | grep -v -E "Running|Completed" || true)
            [ -z "$NOT_READY" ] && break
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "TIMEOUT: pods not ready after upgrade"
              kubectl describe pods -n "$NAMESPACE" 2>/dev/null | tail -60
              exit 1
            fi
            sleep 15
          done

      - name: Verify /healthz returns 200 (upgrade test)
        run: |
          NAMESPACE=groovelab
          kubectl port-forward svc/groovelab-backend 18081:8080 -n "$NAMESPACE" &
          PF_PID=$!
          sleep 5

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18081/healthz)
          kill "$PF_PID" 2>/dev/null || true

          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: /healthz returned HTTP ${HTTP_CODE} after upgrade, expected 200"
            exit 1
          fi
          echo "PASS: upgrade test /healthz returned HTTP 200"

      - name: Tear down CMX cluster
        if: always()
        run: |
          if [ -n "${{ steps.cluster.outputs.id }}" ]; then
            replicated cluster rm "${{ steps.cluster.outputs.id }}" \
              --app "${{ env.APP_SLUG }}" || true
            echo "Cluster removal requested."
          fi

      # GRO-qrdt: per-job wall-clock timing summary.
      - name: Job timing summary
        if: always()
        env:
          JOB_NAME: ${{ github.job }}
          RUNNER_OS: ${{ runner.os }}
          JOB_START: ${{ steps.job_start.outputs.epoch }}
        run: |
          set +e
          END=$(date +%s)
          if [ -z "$JOB_START" ] || ! [ "$JOB_START" -eq "$JOB_START" ] 2>/dev/null; then
            DUR_HUMAN="unknown"
            START_ISO="unknown"
            END_ISO="unknown"
          else
            DUR=$((END - JOB_START))
            MIN=$((DUR / 60))
            SEC=$((DUR % 60))
            DUR_HUMAN="${MIN}m ${SEC}s (${DUR}s)"
            START_ISO=$(date -u -d "@${JOB_START}" --iso-8601=seconds 2>/dev/null || echo "unknown")
            END_ISO=$(date -u -d "@${END}" --iso-8601=seconds 2>/dev/null || echo "unknown")
          fi
          {
            echo "### Job timing: ${JOB_NAME}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Duration | ${DUR_HUMAN} |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Start | ${START_ISO} |"
            echo "| End | ${END_ISO} |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  # ── Promote to Stable ────────────────────────────────────────────────────
  promote-stable:
    name: Promote to Stable
    runs-on: ubuntu-latest
    # GRO-fuxa: read version from build-sign-collect (matrix job outputs
    # aren't directly addressable). build-sign is still in `needs:` so this
    # job still gates on both matrix legs succeeding.
    needs: [build-sign, build-sign-collect, release-unstable]
    # Belt-and-suspenders guard: only run for clean SemVer tags (e.g. v1.2.3).
    # Skips dev/throwaway tags like v9.9.9-seq-fix-1, v0.1.1-dev, v1.2.3-rc.1,
    # v1.2.3+build.5 so they never auto-publish to Stable even if the
    # `production` environment protection rule is misconfigured or absent.
    # GHA `if:` expressions don't support regex; contains-based negation is
    # sufficient since SemVer prerelease uses `-` and build-metadata uses `+`.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') && !contains(github.ref_name, '+')
    # Manual gate: requires approval via GitHub Environment protection rules.
    # Configure "production" environment in repo Settings > Environments with
    # required reviewers. The email notification for Stable promotion is
    # configured in the Replicated Vendor Portal (Settings > Notifications).
    environment: production
    env:
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
      VERSION: ${{ needs.build-sign-collect.outputs.version }}
    steps:
      - name: Record job start
        id: job_start
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      # GRO-mf1d: pinned, deduplicated install via local composite action
      # (.github/actions/setup-replicated-cli). The previous inline pattern
      # called api.github.com/.../releases/latest, which was rate-limited and
      # silently chased the newest CLI release.
      - name: Install Replicated CLI
        uses: ./.github/actions/setup-replicated-cli

      - name: Promote release to Stable
        run: |
          SEQUENCE="${{ needs.release-unstable.outputs.release-sequence }}"
          replicated release promote "${SEQUENCE}" Stable \
            --version "${{ env.VERSION }}" \
            --app "${{ env.APP_SLUG }}"
          echo "Release ${{ env.VERSION }} (sequence ${SEQUENCE}) promoted to Stable."
          echo ""
          echo "Email notification will be sent to configured recipients in the"
          echo "Replicated Vendor Portal (Settings > Notifications)."

      - name: Document Cosign verification command
        run: |
          echo "================================================================"
          echo "To verify image signatures for this release:"
          echo ""
          echo "  cosign verify \\"
          echo "    --certificate-identity-regexp='https://github.com/adamancini/groovelab/' \\"
          echo "    --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \\"
          echo "    ${{ env.GHCR_PREFIX }}/groovelab-frontend:${{ env.VERSION }}"
          echo ""
          echo "  cosign verify \\"
          echo "    --certificate-identity-regexp='https://github.com/adamancini/groovelab/' \\"
          echo "    --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \\"
          echo "    ${{ env.GHCR_PREFIX }}/groovelab-backend:${{ env.VERSION }}"
          echo "================================================================"

      # GRO-qrdt: per-job wall-clock timing summary.
      - name: Job timing summary
        if: always()
        env:
          JOB_NAME: ${{ github.job }}
          RUNNER_OS: ${{ runner.os }}
          JOB_START: ${{ steps.job_start.outputs.epoch }}
        run: |
          set +e
          END=$(date +%s)
          if [ -z "$JOB_START" ] || ! [ "$JOB_START" -eq "$JOB_START" ] 2>/dev/null; then
            DUR_HUMAN="unknown"
            START_ISO="unknown"
            END_ISO="unknown"
          else
            DUR=$((END - JOB_START))
            MIN=$((DUR / 60))
            SEC=$((DUR % 60))
            DUR_HUMAN="${MIN}m ${SEC}s (${DUR}s)"
            START_ISO=$(date -u -d "@${JOB_START}" --iso-8601=seconds 2>/dev/null || echo "unknown")
            END_ISO=$(date -u -d "@${END}" --iso-8601=seconds 2>/dev/null || echo "unknown")
          fi
          {
            echo "### Job timing: ${JOB_NAME}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Duration | ${DUR_HUMAN} |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Start | ${START_ISO} |"
            echo "| End | ${END_ISO} |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
