name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write  # Required for Cosign keyless signing via OIDC

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GHCR_PREFIX: ghcr.io/adamancini
  APP_SLUG: groovelab
  HELM_VERSION: "4.1.4"
  K3S_VERSION: "1.32"

jobs:
  # ── Lint and Test ─────────────────────────────────────────────────────────
  lint-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm lint
        run: |
          helm dependency update chart/
          # Helm v4 requires extracted subchart directories for linting
          cd chart/charts && for f in *.tgz; do [ -f "$f" ] && tar xzf "$f"; done && cd ../..
          helm lint chart/

      - name: Go test
        working-directory: backend
        run: go test ./...

      - name: npm install
        working-directory: frontend
        run: npm ci

      - name: npm lint
        working-directory: frontend
        run: npm run lint

      - name: npm test
        working-directory: frontend
        run: npm run test

  # ── Build, Push, and Sign Images ─────────────────────────────────────────
  build-sign:
    name: Build, Push, and Sign Images
    runs-on: ubuntu-latest
    needs: lint-test
    outputs:
      frontend-digest: ${{ steps.build-frontend.outputs.digest }}
      backend-digest: ${{ steps.build-backend.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          TAG="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend/
          platforms: linux/amd64
          push: true
          tags: ${{ env.GHCR_PREFIX }}/groovelab-frontend:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: backend/
          platforms: linux/amd64
          push: true
          tags: ${{ env.GHCR_PREFIX }}/groovelab-backend:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign frontend image
        run: |
          cosign sign --yes \
            "${{ env.GHCR_PREFIX }}/groovelab-frontend@${{ steps.build-frontend.outputs.digest }}"

      - name: Sign backend image
        run: |
          cosign sign --yes \
            "${{ env.GHCR_PREFIX }}/groovelab-backend@${{ steps.build-backend.outputs.digest }}"

  # ── Replicated Release and CMX Test ──────────────────────────────────────
  cmx-test:
    name: Replicated Release and CMX Test
    runs-on: ubuntu-latest
    needs: build-sign
    env:
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
      CHANNEL_NAME: pr-${{ github.event.pull_request.number }}
      IMAGE_TAG: ${{ needs.build-sign.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL \
            | tar xz -C /usr/local/bin replicated

      - name: Create temporary channel
        id: channel
        run: |
          CHANNEL_OUTPUT=$(replicated channel create \
            --name "${{ env.CHANNEL_NAME }}" \
            --app "${{ env.APP_SLUG }}")
          CHANNEL_ID=$(echo "$CHANNEL_OUTPUT" | awk 'NR==2 {print $1}')
          echo "id=${CHANNEL_ID}" >> "$GITHUB_OUTPUT"
          echo "Channel created: ${{ env.CHANNEL_NAME }} (ID: ${CHANNEL_ID})"

      - name: Package and create release
        run: |
          helm dependency update chart/
          # Helm v4: extract subchart tarballs for replicated release
          cd chart/charts && for f in *.tgz; do [ -f "$f" ] && tar xzf "$f"; done && cd ../..
          replicated release create \
            --yaml-dir chart/ \
            --promote "${{ env.CHANNEL_NAME }}" \
            --version "${{ env.IMAGE_TAG }}" \
            --app "${{ env.APP_SLUG }}"

      - name: Provision CMX k3s cluster
        id: cluster
        run: |
          CLUSTER_OUTPUT=$(replicated cluster create \
            --distribution k3s \
            --version "${{ env.K3S_VERSION }}" \
            --name "pr-${{ github.event.pull_request.number }}" \
            --ttl 1h \
            --wait 10m \
            --app "${{ env.APP_SLUG }}")
          CLUSTER_ID=$(echo "$CLUSTER_OUTPUT" | awk 'NR==2 {print $1}')
          echo "id=${CLUSTER_ID}" >> "$GITHUB_OUTPUT"
          echo "Cluster provisioned: ${CLUSTER_ID}"

      - name: Export kubeconfig
        run: |
          replicated cluster kubeconfig "${{ steps.cluster.outputs.id }}" \
            --app "${{ env.APP_SLUG }}" \
            --output-path "${{ runner.temp }}/kubeconfig.yaml"
          echo "KUBECONFIG=${{ runner.temp }}/kubeconfig.yaml" >> "$GITHUB_ENV"

      - name: Verify cluster access
        run: kubectl cluster-info

      - name: Install CNPG operator
        run: |
          helm dependency update chart/
          cd chart/charts && for f in cloudnative-pg*.tgz; do [ -f "$f" ] && tar xzf "$f"; done && cd ../..
          helm install cnpg-operator chart/charts/cloudnative-pg \
            --namespace cnpg-system --create-namespace \
            --wait --timeout 3m

      - name: Create namespace and prerequisites
        run: |
          NAMESPACE=groovelab
          kubectl create namespace "$NAMESPACE"

          # CNPG credentials
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: groovelab-cnpg-credentials
            namespace: ${NAMESPACE}
          type: kubernetes.io/basic-auth
          stringData:
            username: groovelab
            password: ci-test-password
          EOF

          # CNPG Cluster
          kubectl apply -f - <<EOF
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: groovelab-postgresql
            namespace: ${NAMESPACE}
          spec:
            instances: 1
            bootstrap:
              initdb:
                database: groovelab
                owner: groovelab
                secret:
                  name: groovelab-cnpg-credentials
            storage:
              size: 1Gi
          EOF

          echo "Waiting for CNPG Cluster to become ready..."
          kubectl wait --for=condition=Ready cluster/groovelab-postgresql \
            -n "${NAMESPACE}" --timeout=5m

          # ExternalName service alias
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: groovelab-postgresql
            namespace: ${NAMESPACE}
          spec:
            type: ExternalName
            externalName: groovelab-postgresql-rw.${NAMESPACE}.svc.cluster.local
            ports:
              - port: 5432
                targetPort: 5432
          EOF

          # GHCR imagePullSecret
          kubectl create secret docker-registry ghcr-credentials \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --namespace "$NAMESPACE"

      - name: Helm install groovelab
        run: |
          NAMESPACE=groovelab
          # Extract all subchart tarballs (Helm v4 requirement)
          cd chart/charts && for f in *.tgz; do [ -f "$f" ] && [ ! -d "${f%.tgz}" ] && tar xzf "$f" || true; done && cd ../..

          helm install groovelab chart/ \
            --namespace "$NAMESPACE" \
            --set image.frontend.repository="${{ env.GHCR_PREFIX }}/groovelab-frontend" \
            --set image.frontend.tag="${{ env.IMAGE_TAG }}" \
            --set image.backend.repository="${{ env.GHCR_PREFIX }}/groovelab-backend" \
            --set image.backend.tag="${{ env.IMAGE_TAG }}" \
            --set 'global.imagePullSecrets[0].name=ghcr-credentials' \
            --set global.replicated.dockerconfigjson=null \
            --set cert-manager.enabled=false \
            --set cloudnative-pg.enabled=false \
            --set replicated.enabled=false

      - name: Wait for pods to be ready
        run: |
          NAMESPACE=groovelab
          DEADLINE=$(($(date +%s) + 300))
          while true; do
            echo "[$(date +%H:%M:%S)] Pod status:"
            kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null || true
            NOT_READY=$(kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null \
              | grep -v -E "Running|Completed" || true)
            [ -z "$NOT_READY" ] && break
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "TIMEOUT: pods not ready after 5 minutes"
              kubectl describe pods -n "$NAMESPACE" 2>/dev/null | tail -60
              exit 1
            fi
            sleep 15
          done
          echo "All pods running."

      - name: Verify /healthz returns 200
        run: |
          NAMESPACE=groovelab
          kubectl port-forward svc/groovelab-backend 18080:8080 -n "$NAMESPACE" &
          PF_PID=$!
          sleep 5

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18080/healthz)
          kill "$PF_PID" 2>/dev/null || true

          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: /healthz returned HTTP ${HTTP_CODE}, expected 200"
            exit 1
          fi
          echo "PASS: /healthz returned HTTP 200"

      - name: Tear down CMX cluster
        if: always()
        run: |
          if [ -n "${{ steps.cluster.outputs.id }}" ]; then
            replicated cluster rm "${{ steps.cluster.outputs.id }}" \
              --app "${{ env.APP_SLUG }}" || true
            echo "Cluster removal requested."
          fi

      - name: Archive temporary channel
        if: always()
        run: |
          if [ -n "${{ steps.channel.outputs.id }}" ]; then
            replicated channel rm "${{ steps.channel.outputs.id }}" \
              --app "${{ env.APP_SLUG }}" || true
            echo "Channel archived."
          fi
