name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write  # Required for Cosign keyless signing via OIDC

# Concurrency group is per-PR (shared across all jobs so a new push cancels
# previous runs). The cmx-test job further scopes via the resources it creates
# (channel/customer/cluster named by the per-PR slug).
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GHCR_PREFIX: ghcr.io/adamancini
  APP_SLUG: groovelab
  HELM_VERSION: "4.1.4"
  K3S_VERSION: "1.32"

jobs:
  # ── Lint and Test ─────────────────────────────────────────────────────────
  lint-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm lint
        run: |
          helm dependency update chart/
          # Helm v4 requires extracted subchart directories for linting
          cd chart/charts && for f in *.tgz; do [ -f "$f" ] && tar xzf "$f"; done && cd ../..
          helm lint chart/

      - name: Go test
        working-directory: backend
        run: go test ./...

      - name: npm install
        working-directory: frontend
        run: npm ci

      - name: npm lint
        working-directory: frontend
        run: npm run lint

      - name: npm test
        working-directory: frontend
        run: npm run test

  # ── Build, Push, and Sign Images ─────────────────────────────────────────
  build-sign:
    name: Build, Push, and Sign Images
    runs-on: ubuntu-latest
    needs: lint-test
    outputs:
      frontend-digest: ${{ steps.build-frontend.outputs.digest }}
      backend-digest: ${{ steps.build-backend.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          TAG="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend/
          platforms: linux/amd64
          push: true
          tags: ${{ env.GHCR_PREFIX }}/groovelab-frontend:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: backend/
          platforms: linux/amd64
          push: true
          tags: ${{ env.GHCR_PREFIX }}/groovelab-backend:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign frontend image
        run: |
          cosign sign --yes \
            "${{ env.GHCR_PREFIX }}/groovelab-frontend@${{ steps.build-frontend.outputs.digest }}"

      - name: Sign backend image
        run: |
          cosign sign --yes \
            "${{ env.GHCR_PREFIX }}/groovelab-backend@${{ steps.build-backend.outputs.digest }}"

  # ── Replicated Release and CMX Test ──────────────────────────────────────
  # Customer-grade install: per-PR channel + trial customer + ephemeral CMX
  # cluster + OCI install from registry.replicated.com. Exercises the same
  # code path a real customer does (proxy.xyyzx.net pulls, Replicated SDK,
  # license secret shape, channel-gated release visibility). See GRO-lcva.
  #
  # Slug normalization extends the platform-examples pattern
  # (replicatedhq/platform-examples applications/wg-easy/taskfiles/utils.yml
  # `normalize-name`, which does `tr '/_.' '-'`) with lowercasing,
  # invalid-char stripping, and a truncate+sha7 fallback for branch names
  # longer than 36 chars.
  #
  # Secret requirements:
  #   - REPLICATED_API_TOKEN: create channel/customer/cluster + channel archive.
  #   - REPLICATED_ADMIN_TOKEN (optional): only needed if REPLICATED_API_TOKEN
  #     lacks `channel demote` permission. Used in pr-cleanup.yaml.
  cmx-test:
    name: Replicated Release and CMX Test
    runs-on: ubuntu-latest
    needs: build-sign
    env:
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
      IMAGE_TAG: ${{ needs.build-sign.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL \
            | tar xz -C /usr/local/bin replicated

      # Step 1 — Compute slug and chart version from the PR branch.
      # Slug normalization algorithm (see story GRO-lcva):
      #   1. lowercase
      #   2. replace '/' '_' '.' with '-' (extends platform-examples
      #      `tr '/_.' '-'`; see wg-easy/taskfiles/utils.yml `normalize-name`)
      #   3. strip anything not [a-z0-9-], collapse runs of '-'
      #   4. trim leading/trailing '-'
      #   5. if length > 36: truncate to 28, append '-<sha7>' of original name
      # CHART_VERSION is 0.0.0-pr<N> — pre-release SemVer so it sorts below
      # any real stable release and cannot accidentally promote past Beta.
      #
      # HEAD_REF is attacker-controlled; pass via env and quote in shell to
      # avoid workflow command injection.
      - name: Compute slug and chart version
        id: slug
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BRANCH="$HEAD_REF"
          RAW=$(printf '%s' "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | tr '/_.' '-' \
            | tr -c 'a-z0-9-' '-' \
            | sed -E 's/-+/-/g; s/^-+//; s/-+$//')
          if [ "${#RAW}" -gt 36 ]; then
            HASH=$(printf '%s' "$BRANCH" | sha256sum | cut -c1-7)
            # Strip trailing dash from the 28-char prefix before appending
            # "-${HASH}" so we never emit a double-dash slug like
            # "foo-bar-baz--1234567". Replicated's OCI registry rejects
            # double-dash segments with an opaque 404 on `helm pull`
            # (see friction log — GRO-s3mc test PR #33 first runs).
            PREFIX=$(printf '%s' "${RAW:0:28}" | sed -E 's/-+$//')
            SLUG="${PREFIX}-${HASH}"
          else
            SLUG="$RAW"
          fi
          # Defensive: ensure slug is non-empty for pathological input.
          if [ -z "$SLUG" ]; then
            SLUG="pr-${PR_NUMBER}"
          fi
          CHART_VERSION="0.0.0-pr${PR_NUMBER}"
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Branch:        ${BRANCH}"
          echo "Slug:          ${SLUG}  (length ${#SLUG})"
          echo "Chart version: ${CHART_VERSION}"

      # Step 2 — Package the chart into release/ so `replicated release create
      # --yaml-dir release/` picks up the tgz rather than the raw chart/ tree.
      - name: Package chart
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          CHART_VERSION: ${{ steps.slug.outputs.chart_version }}
        run: |
          helm dependency update chart/
          mkdir -p release/
          helm package chart/ \
            --version "$CHART_VERSION" \
            --app-version "pr-$SLUG" \
            --destination /tmp/
          mv "/tmp/groovelab-${CHART_VERSION}.tgz" release/
          ls -la release/

      # Step 3 — Create or reuse the per-PR channel (idempotent on re-runs).
      - name: Create or reuse per-PR channel
        id: channel
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          EXISTING=$(replicated channel ls --app "${APP_SLUG}" --output json \
            | jq -r --arg n "$SLUG" '.[] | select(.name == $n) | .id // empty')
          if [ -n "$EXISTING" ]; then
            CHANNEL_ID="$EXISTING"
            echo "Reusing existing channel ${SLUG} (ID: ${CHANNEL_ID})"
          else
            # `replicated channel create --output json` returns an array
            # (`[{"id":"...","name":"..."}]`) in current CLI versions. Accept
            # either shape via an `if type==array` fallback so we don't break
            # when the CLI normalizes to a single object in the future.
            CHANNEL_JSON=$(replicated channel create \
              --name "$SLUG" \
              --app "${APP_SLUG}" \
              --output json)
            CHANNEL_ID=$(echo "$CHANNEL_JSON" \
              | jq -r --arg n "$SLUG" '
                  if type == "array" then
                    (.[] | select(.name == $n) | .id)
                  else
                    (.channel.id // .id // empty)
                  end' \
              | head -n1)
            if [ -z "$CHANNEL_ID" ]; then
              CHANNEL_ID=$(replicated channel ls --app "${APP_SLUG}" --output json \
                | jq -r --arg n "$SLUG" '.[] | select(.name == $n) | .id')
            fi
            echo "Channel created: ${SLUG} (ID: ${CHANNEL_ID})"
          fi
          echo "id=${CHANNEL_ID}" >> "$GITHUB_OUTPUT"

      # Step 4 — Create release from packaged tgz and promote to per-PR channel.
      - name: Create and promote release
        id: release
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          CHART_VERSION: ${{ steps.slug.outputs.chart_version }}
        run: |
          RELEASE_JSON=$(replicated release create \
            --yaml-dir release/ \
            --promote "$SLUG" \
            --version "$CHART_VERSION" \
            --app "${APP_SLUG}" \
            --output json)
          # CLI returns either an object or a single-element array; handle both.
          SEQ=$(echo "$RELEASE_JSON" \
            | jq -r '
                if type == "array" then
                  (.[0].sequence // empty)
                else
                  (.sequence // .release.sequence // empty)
                end')
          echo "sequence=${SEQ}" >> "$GITHUB_OUTPUT"
          echo "Release sequence: ${SEQ} (version ${CHART_VERSION}) promoted to ${SLUG}"

      # Step 5 — Create or reuse a trial customer licensed to this channel.
      - name: Create or reuse trial customer
        id: customer
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          CUSTOMER_NAME="pr-${SLUG}"
          EXISTING=$(replicated customer ls --app "${APP_SLUG}" --output json \
            | jq -r --arg n "$CUSTOMER_NAME" '.[] | select(.name == $n) | .installationId // empty')
          if [ -n "$EXISTING" ]; then
            LICENSE_ID="$EXISTING"
            echo "Reusing existing customer ${CUSTOMER_NAME}"
          else
            CUSTOMER_JSON=$(replicated customer create \
              --name "$CUSTOMER_NAME" \
              --email "pr+${SLUG}@replicated.com" \
              --channel "$SLUG" \
              --type trial \
              --expires-in 24h \
              --app "${APP_SLUG}" \
              --output json)
            LICENSE_ID=$(echo "$CUSTOMER_JSON" \
              | jq -r --arg n "$CUSTOMER_NAME" '
                  if type == "array" then
                    (.[] | select(.name == $n) | .installationId // empty)
                  else
                    (.installationId // .customer.installationId // empty)
                  end' \
              | head -n1)
            if [ -z "$LICENSE_ID" ] || [ "$LICENSE_ID" = "null" ]; then
              LICENSE_ID=$(replicated customer ls --app "${APP_SLUG}" --output json \
                | jq -r --arg n "$CUSTOMER_NAME" '.[] | select(.name == $n) | .installationId')
            fi
            echo "Customer created: ${CUSTOMER_NAME}"
          fi
          if [ -z "$LICENSE_ID" ] || [ "$LICENSE_ID" = "null" ]; then
            echo "ERROR: could not resolve licenseID for ${CUSTOMER_NAME}"
            exit 1
          fi
          # License ID is a secret — mask it in logs.
          echo "::add-mask::${LICENSE_ID}"
          echo "license_id=${LICENSE_ID}" >> "$GITHUB_OUTPUT"

      # Step 6 — Provision a fresh CMX k3s cluster per run (not shared).
      - name: Provision CMX k3s cluster
        id: cluster
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          RUN_ID: ${{ github.run_id }}
        run: |
          CLUSTER_NAME="pr-${SLUG}-${RUN_ID}"
          # CMX name cap is 63 chars; trim defensively.
          CLUSTER_NAME="${CLUSTER_NAME:0:63}"
          CLUSTER_JSON=$(replicated cluster create \
            --distribution k3s \
            --version "${K3S_VERSION}" \
            --name "$CLUSTER_NAME" \
            --ttl 1h \
            --wait 10m \
            --app "${APP_SLUG}" \
            --output json)
          CLUSTER_ID=$(echo "$CLUSTER_JSON" \
            | jq -r --arg n "$CLUSTER_NAME" '
                if type == "array" then
                  (.[] | select(.name == $n) | .id // empty)
                else
                  (.id // .cluster.id // empty)
                end' \
            | head -n1)
          echo "id=${CLUSTER_ID}" >> "$GITHUB_OUTPUT"
          echo "name=${CLUSTER_NAME}" >> "$GITHUB_OUTPUT"
          echo "Cluster provisioned: ${CLUSTER_NAME} (ID: ${CLUSTER_ID})"

      # Cost observability (AC 9). Best-effort: don't fail the job if the
      # subcommand name changes across CLI versions.
      - name: Print cluster cost
        if: steps.cluster.outputs.id != ''
        env:
          CLUSTER_ID: ${{ steps.cluster.outputs.id }}
        run: |
          replicated cluster inspect "$CLUSTER_ID" --app "${APP_SLUG}" || true

      - name: Export kubeconfig
        env:
          CLUSTER_ID: ${{ steps.cluster.outputs.id }}
        run: |
          replicated cluster kubeconfig "$CLUSTER_ID" \
            --app "${APP_SLUG}" \
            --output-path "${{ runner.temp }}/kubeconfig.yaml"
          echo "KUBECONFIG=${{ runner.temp }}/kubeconfig.yaml" >> "$GITHUB_ENV"

      - name: Verify cluster access
        run: kubectl cluster-info

      # Step 7 — Install the chart as a customer would, driven by helmfile.
      #
      # Why helmfile (GRO-s3mc): the groovelab chart renders a
      # postgresql.cnpg.io/v1 Cluster CR from the cloudnative-pg subchart's
      # CRD. CNPG ships its CRDs in the subchart's templates/crds/
      # directory (NOT in crds/), so a single 'helm install' races the CRD
      # install against the parent Cluster CR and fails with
      # 'no matches for kind "Cluster" in version "postgresql.cnpg.io/v1"'.
      # Helmfile sequences CNPG as a separate release with needs: wiring
      # (see helmfile.yaml.gotmpl's replicated environment), guaranteeing
      # the CRDs are Established before the groovelab release is applied.
      # Reference pattern: replicatedhq/platform-examples
      # /patterns/multi-chart-orchestration.
      #
      # Helmfile needs the helm-diff plugin; install both on top of the
      # azure/setup-helm@v4 helm already in PATH.
      - name: Install helmfile and helm-diff plugin
        env:
          HELMFILE_VERSION: "1.4.4"
        run: |
          # helm-diff is a helmfile apply dependency.
          helm plugin install https://github.com/databus23/helm-diff --version v3.9.10 || true
          curl -fsSL \
            "https://github.com/helmfile/helmfile/releases/download/v${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin/ helmfile
          helmfile --version
          helm plugin list

      # helmfile.yaml.gotmpl reads ./chart/charts/cloudnative-pg/Chart.yaml
      # via `exec "yq"` to pin the CNPG release version. `helm dependency
      # update` (run in the Package chart step above) pulls the subchart as
      # `chart/charts/cloudnative-pg-<ver>.tgz`; helmfile needs the
      # extracted directory. Match the extraction the lint-test job already
      # performs so helmfile can resolve the version.
      - name: Extract subchart tarballs for helmfile
        run: |
          helm dependency update chart/
          (cd chart/charts && for f in *.tgz; do
            [ -f "$f" ] && tar xzf "$f"
          done)
          ls -la chart/charts/
          test -f chart/charts/cloudnative-pg/Chart.yaml
          yq '.version' chart/charts/cloudnative-pg/Chart.yaml

      # Log in to registry.replicated.com so helmfile can pull the groovelab
      # chart from the Replicated OCI registry. License ID is the username
      # AND password per Replicated docs.
      - name: Helm registry login (registry.replicated.com)
        env:
          LICENSE_ID: ${{ steps.customer.outputs.license_id }}
        run: |
          echo "$LICENSE_ID" \
            | helm registry login registry.replicated.com \
              --username "$LICENSE_ID" \
              --password-stdin

      # Replicated OCI registry may lag a few seconds behind release promote
      # (the chart is packaged + promoted + then becomes OCI-fetchable). Poll
      # with `helm show chart` until the new version is visible so helmfile's
      # subsequent `helm pull` does not 404 on a freshly promoted chart.
      - name: Wait for OCI chart to be fetchable
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          CHART_VERSION: ${{ steps.slug.outputs.chart_version }}
        run: |
          CHART_URL="oci://registry.replicated.com/${APP_SLUG}/${SLUG}/groovelab"
          echo "[$(date +%H:%M:%S)] polling ${CHART_URL}:${CHART_VERSION}"
          for i in $(seq 1 18); do
            if helm show chart "$CHART_URL" --version "$CHART_VERSION" >/dev/null 2>&1; then
              echo "[$(date +%H:%M:%S)] chart available after ${i} attempt(s)"
              exit 0
            fi
            echo "[$(date +%H:%M:%S)] attempt ${i}: not yet available; sleeping 10s"
            sleep 10
          done
          echo "ERROR: chart ${CHART_URL}:${CHART_VERSION} never became fetchable"
          helm show chart "$CHART_URL" --version "$CHART_VERSION" || true
          exit 1

      # helmfile apply against the 'replicated' environment installs CNPG
      # operator first (release 'cnpg' in cnpg-system), waits for it to be
      # Ready, then installs groovelab from the OCI URL. The CRD-check hook
      # in chart/templates/crd-check-job.yaml provides a second line of
      # defense inside the groovelab release itself.
      #
      # NO --set overrides — the chart defaults (Replicated SDK enabled,
      # proxy.xyyzx.net images, injected dockerconfigjson) are exactly what
      # this job is designed to exercise.
      - name: Helmfile apply (CNPG first, then groovelab)
        env:
          LICENSE_ID: ${{ steps.customer.outputs.license_id }}
          REPLICATED_APP: ${{ env.APP_SLUG }}
          CHANNEL: ${{ steps.slug.outputs.slug }}
          CHART_VERSION: ${{ steps.slug.outputs.chart_version }}
        run: |
          echo "[$(date +%H:%M:%S)] helmfile apply -e replicated (CNPG -> groovelab)"
          helmfile -e replicated apply --wait --include-transitive-needs

          echo "[$(date +%H:%M:%S)] helmfile releases:"
          helmfile -e replicated list

          echo "[$(date +%H:%M:%S)] CNPG CRD status:"
          kubectl get crd clusters.postgresql.cnpg.io \
            -o jsonpath='{.status.conditions[?(@.type=="Established")].status}' && echo

      # Step 8 — Smoke tests against the customer-grade install.
      - name: Wait for pods to be ready
        run: |
          NAMESPACE=groovelab
          DEADLINE=$(($(date +%s) + 300))
          while true; do
            echo "[$(date +%H:%M:%S)] Pod status:"
            kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null || true
            NOT_READY=$(kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null \
              | grep -v -E "Running|Completed" || true)
            [ -z "$NOT_READY" ] && break
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "TIMEOUT: pods not ready after 5 minutes"
              kubectl describe pods -n "$NAMESPACE" 2>/dev/null | tail -80
              exit 1
            fi
            sleep 15
          done
          echo "All pods running."

      - name: Smoke test — /healthz 200 and session contract 404
        run: |
          NAMESPACE=groovelab
          kubectl port-forward svc/groovelab-backend 18080:8080 -n "$NAMESPACE" &
          PF_PID=$!
          sleep 5

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18080/healthz)
          if [ "$HTTP_CODE" != "200" ]; then
            kill "$PF_PID" 2>/dev/null || true
            echo "FAIL: /healthz returned HTTP ${HTTP_CODE}, expected 200"
            exit 1
          fi
          echo "PASS: /healthz returned HTTP 200"

          ANSWER_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST -H 'Content-Type: application/json' -d '{}' \
            http://localhost:18080/api/v1/flashcards/answer)
          kill "$PF_PID" 2>/dev/null || true
          if [ "$ANSWER_CODE" != "404" ]; then
            echo "FAIL: POST /api/v1/flashcards/answer returned HTTP ${ANSWER_CODE}, expected 404"
            exit 1
          fi
          echo "PASS: POST /api/v1/flashcards/answer returned HTTP 404 (no session)"

      # Step 9 — Upgrade test: publish a second release on the same channel,
      # upgrade the install in place, re-run smoke tests.
      - name: Upgrade test — package + release + helm upgrade
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          NAMESPACE=groovelab
          UPGRADE_VERSION="0.0.0-pr${PR_NUMBER}.1"
          rm -f release/groovelab-*.tgz
          helm package chart/ \
            --version "$UPGRADE_VERSION" \
            --app-version "pr-${SLUG}-upgrade" \
            --destination /tmp/
          mv "/tmp/groovelab-${UPGRADE_VERSION}.tgz" release/

          replicated release create \
            --yaml-dir release/ \
            --promote "$SLUG" \
            --version "$UPGRADE_VERSION" \
            --app "${APP_SLUG}" \
            --output json

          helm upgrade groovelab \
            "oci://registry.replicated.com/${APP_SLUG}/${SLUG}/groovelab" \
            --version "$UPGRADE_VERSION" \
            --namespace "$NAMESPACE" \
            --wait --timeout 6m

          echo "Re-running smoke tests after upgrade..."
          kubectl port-forward svc/groovelab-backend 18081:8080 -n "$NAMESPACE" &
          PF_PID=$!
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18081/healthz)
          kill "$PF_PID" 2>/dev/null || true
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL (post-upgrade): /healthz returned HTTP ${HTTP_CODE}"
            exit 1
          fi
          echo "PASS: post-upgrade /healthz returned 200"

      # Step 10 — Cleanup. Cluster is removed eagerly (1h TTL is a safety net).
      # Channel/customer teardown happens in pr-cleanup.yaml on PR close so
      # re-runs of the same PR reuse them idempotently during iteration.
      - name: Tear down CMX cluster
        if: always()
        env:
          CLUSTER_ID: ${{ steps.cluster.outputs.id }}
        run: |
          if [ -n "$CLUSTER_ID" ]; then
            replicated cluster rm "$CLUSTER_ID" --app "${APP_SLUG}" || true
            echo "Cluster removal requested."
          fi
