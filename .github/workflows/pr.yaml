name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write  # Required for Cosign keyless signing via OIDC

# Concurrency group is per-PR (shared across all jobs so a new push cancels
# previous runs). The cmx-test job further scopes via the resources it creates
# (channel/customer/cluster named by the per-PR slug).
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GHCR_PREFIX: ghcr.io/adamancini
  APP_SLUG: groovelab
  HELM_VERSION: "4.1.4"
  K3S_VERSION: "1.34"

jobs:
  # ── Detect Changes ────────────────────────────────────────────────────────
  # Path-filter gate (GRO-jg8v): heavyweight Build+Sign and CMX Test jobs are
  # skipped on docs-only PRs (markdown, FRICTION_LOG, vault knowledge, etc.).
  # GRO-6gq2: lint-test was split into go-test/node-test/helm-lint and is
  # also gated on `code == 'true'` so docs-only PRs skip all of them too —
  # they report `skipped` (== success for branch protection).
  #
  # NOTE: filter is intentionally job-level (dorny/paths-filter) NOT
  # workflow-level `paths:` / `paths-ignore:`. Workflow-level filtering would
  # prevent the workflow from appearing at all on docs PRs, which breaks
  # branch-protection required-status-checks (a check that never runs blocks
  # merge). Job-level skip + `if:` reports as "skipped" which counts as
  # success for branch protection. See .github/workflows/README.md.
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      # GRO-qrdt: per-job wall-clock timing. `id: job_start` is read by the
      # final `Job timing summary` step. Step is intentionally first so the
      # measurement covers the whole job, including checkout.
      - name: Record job start
        id: job_start
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # Negated patterns + `predicate-quantifier: every`: a file matches
          # only when it satisfies ALL negations (i.e., is NOT in any of the
          # doc-class paths). The default quantifier (`some`) would OR the
          # patterns, treating any non-md path as a match — exactly wrong
          # for skip-on-docs intent.
          predicate-quantifier: every
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'
              - '!FRICTION_LOG.md'
              - '!.vault/knowledge/**'
              - '!.gitignore'

      # GRO-qrdt: end-of-job timing summary. `if: always()` so failed/cancelled
      # jobs still report. Falls back to "unknown" if epoch arithmetic fails so
      # this step cannot fail the workflow (story AC6).
      - name: Job timing summary
        if: always()
        env:
          JOB_NAME: ${{ github.job }}
          RUNNER_OS: ${{ runner.os }}
          JOB_START: ${{ steps.job_start.outputs.epoch }}
        run: |
          set +e
          END=$(date +%s)
          if [ -z "$JOB_START" ] || ! [ "$JOB_START" -eq "$JOB_START" ] 2>/dev/null; then
            DUR_HUMAN="unknown"
            START_ISO="unknown"
            END_ISO="unknown"
          else
            DUR=$((END - JOB_START))
            MIN=$((DUR / 60))
            SEC=$((DUR % 60))
            DUR_HUMAN="${MIN}m ${SEC}s (${DUR}s)"
            START_ISO=$(date -u -d "@${JOB_START}" --iso-8601=seconds 2>/dev/null || echo "unknown")
            END_ISO=$(date -u -d "@${END}" --iso-8601=seconds 2>/dev/null || echo "unknown")
          fi
          {
            echo "### Job timing: ${JOB_NAME}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Duration | ${DUR_HUMAN} |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Start | ${START_ISO} |"
            echo "| End | ${END_ISO} |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  # ── Lint and Test (parallel split) ────────────────────────────────────────
  # GRO-6gq2: previously a single `lint-test` job ran helm-lint + go-test +
  # npm-{ci,lint,test} serially on one runner (~3-4 min wall-clock). Split
  # into three jobs running on separate runners so wall-clock collapses to
  # max(go-test, node-test, helm-lint) ≈ 1.5-2 min. Each job:
  #   - gates on `needs.detect-changes.outputs.code == 'true'` (GRO-jg8v) so
  #     docs-only PRs skip all three (skipped == success for branch protection).
  #   - retains its respective build-cache (GRO-i987): setup-go cache: true,
  #     setup-node cache: 'npm', actions/cache@v4 for chart/charts/.
  #   - emits the GRO-qrdt per-job timing summary independently.
  # Downstream `build-sign` and `cmx-test` `needs:` are updated to gate on
  # all three new jobs (was: `lint-test`).
  go-test:
    name: Go test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    steps:
      - name: Record job start
        id: job_start
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Go test
        working-directory: backend
        # -p 4: package-level parallelism (GRO-i987). -shuffle on: surfaces
        # inter-test ordering bugs without materially slowing the suite.
        run: go test -p 4 -shuffle=on ./...

      # GRO-qrdt: per-job wall-clock timing summary.
      - name: Job timing summary
        if: always()
        env:
          JOB_NAME: ${{ github.job }}
          RUNNER_OS: ${{ runner.os }}
          JOB_START: ${{ steps.job_start.outputs.epoch }}
        run: |
          set +e
          END=$(date +%s)
          if [ -z "$JOB_START" ] || ! [ "$JOB_START" -eq "$JOB_START" ] 2>/dev/null; then
            DUR_HUMAN="unknown"
            START_ISO="unknown"
            END_ISO="unknown"
          else
            DUR=$((END - JOB_START))
            MIN=$((DUR / 60))
            SEC=$((DUR % 60))
            DUR_HUMAN="${MIN}m ${SEC}s (${DUR}s)"
            START_ISO=$(date -u -d "@${JOB_START}" --iso-8601=seconds 2>/dev/null || echo "unknown")
            END_ISO=$(date -u -d "@${END}" --iso-8601=seconds 2>/dev/null || echo "unknown")
          fi
          {
            echo "### Job timing: ${JOB_NAME}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Duration | ${DUR_HUMAN} |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Start | ${START_ISO} |"
            echo "| End | ${END_ISO} |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  node-test:
    name: Node test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    steps:
      - name: Record job start
        id: job_start
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm install
        working-directory: frontend
        run: npm ci

      - name: npm lint
        working-directory: frontend
        run: npm run lint

      - name: npm test
        working-directory: frontend
        run: npm run test

      # GRO-qrdt: per-job wall-clock timing summary.
      - name: Job timing summary
        if: always()
        env:
          JOB_NAME: ${{ github.job }}
          RUNNER_OS: ${{ runner.os }}
          JOB_START: ${{ steps.job_start.outputs.epoch }}
        run: |
          set +e
          END=$(date +%s)
          if [ -z "$JOB_START" ] || ! [ "$JOB_START" -eq "$JOB_START" ] 2>/dev/null; then
            DUR_HUMAN="unknown"
            START_ISO="unknown"
            END_ISO="unknown"
          else
            DUR=$((END - JOB_START))
            MIN=$((DUR / 60))
            SEC=$((DUR % 60))
            DUR_HUMAN="${MIN}m ${SEC}s (${DUR}s)"
            START_ISO=$(date -u -d "@${JOB_START}" --iso-8601=seconds 2>/dev/null || echo "unknown")
            END_ISO=$(date -u -d "@${END}" --iso-8601=seconds 2>/dev/null || echo "unknown")
          fi
          {
            echo "### Job timing: ${JOB_NAME}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Duration | ${DUR_HUMAN} |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Start | ${START_ISO} |"
            echo "| End | ${END_ISO} |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    steps:
      - name: Record job start
        id: job_start
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      # Cache Helm subchart tarballs keyed on Chart.lock hash (GRO-i987).
      # helm dependency update below is a no-op on cache hit (tarballs already
      # present + matching Chart.lock), so cache-hit skips subchart re-fetch.
      - name: Cache helm chart deps
        uses: actions/cache@v5
        with:
          path: chart/charts
          key: helm-deps-${{ runner.os }}-${{ hashFiles('chart/Chart.lock') }}
          restore-keys: |
            helm-deps-${{ runner.os }}-

      - name: Helm lint
        run: |
          helm dependency update chart/
          # Helm v4 requires extracted subchart directories for linting
          cd chart/charts && for f in *.tgz; do [ -f "$f" ] && tar xzf "$f"; done && cd ../..
          helm lint chart/

      # GRO-qrdt: per-job wall-clock timing summary.
      - name: Job timing summary
        if: always()
        env:
          JOB_NAME: ${{ github.job }}
          RUNNER_OS: ${{ runner.os }}
          JOB_START: ${{ steps.job_start.outputs.epoch }}
        run: |
          set +e
          END=$(date +%s)
          if [ -z "$JOB_START" ] || ! [ "$JOB_START" -eq "$JOB_START" ] 2>/dev/null; then
            DUR_HUMAN="unknown"
            START_ISO="unknown"
            END_ISO="unknown"
          else
            DUR=$((END - JOB_START))
            MIN=$((DUR / 60))
            SEC=$((DUR % 60))
            DUR_HUMAN="${MIN}m ${SEC}s (${DUR}s)"
            START_ISO=$(date -u -d "@${JOB_START}" --iso-8601=seconds 2>/dev/null || echo "unknown")
            END_ISO=$(date -u -d "@${END}" --iso-8601=seconds 2>/dev/null || echo "unknown")
          fi
          {
            echo "### Job timing: ${JOB_NAME}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Duration | ${DUR_HUMAN} |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Start | ${START_ISO} |"
            echo "| End | ${END_ISO} |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  # ── Build, Push, and Sign Images (matrix: frontend || backend) ───────────
  # GRO-fuxa: previously a single job that built+pushed+signed both images
  # serially (~3.5m wall-clock). Split into a 2-leg matrix so the two images
  # build in parallel runners (~1.8m wall-clock target). Each leg keeps its
  # own buildx cache scope (GRO-i987) so the parallel legs don't thrash a
  # shared `type=gha` cache.
  build-sign:
    name: Build, Push, and Sign (${{ matrix.service }})
    runs-on: ubuntu-latest
    # GRO-6gq2: gate on all three parallel test jobs (was: lint-test).
    needs: [detect-changes, go-test, node-test, helm-lint]
    if: needs.detect-changes.outputs.code == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write  # cosign keyless signing via OIDC (per-leg)
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, backend]
    steps:
      - name: Record job start
        id: job_start
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute image tag
        id: meta
        run: |
          TAG="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Per-image cache scope (GRO-i987) preserved under matrix: each leg
      # has its own scope so frontend layer churn doesn't invalidate backend
      # layers and vice versa.
      - name: Build and push ${{ matrix.service }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.service }}/
          platforms: linux/amd64
          push: true
          tags: ${{ env.GHCR_PREFIX }}/groovelab-${{ matrix.service }}:${{ steps.meta.outputs.tag }}
          # GRO-n9bk: registry-backed buildx cache. Branch-independent (vs
          # type=gha which scopes per-ref + branch and is aggressively evicted
          # under GHA's 10GB-per-repo budget). Cache layers are pushed to
          # `groovelab-<service>:buildcache` on GHCR, sharing across PRs and
          # main. Per-image ref keeps frontend and backend caches independent.
          # `image-manifest=true,oci-mediatypes=true` is required for GHCR
          # compatibility with the registry cache exporter.
          cache-from: |
            type=registry,ref=${{ env.GHCR_PREFIX }}/groovelab-${{ matrix.service }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.GHCR_PREFIX }}/groovelab-${{ matrix.service }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign ${{ matrix.service }} image
        run: |
          cosign sign --yes \
            "${{ env.GHCR_PREFIX }}/groovelab-${{ matrix.service }}@${{ steps.build.outputs.digest }}"

      # GRO-qrdt: per-job wall-clock timing summary (per matrix leg).
      - name: Job timing summary
        if: always()
        env:
          JOB_NAME: ${{ github.job }} (${{ matrix.service }})
          RUNNER_OS: ${{ runner.os }}
          JOB_START: ${{ steps.job_start.outputs.epoch }}
        run: |
          set +e
          END=$(date +%s)
          if [ -z "$JOB_START" ] || ! [ "$JOB_START" -eq "$JOB_START" ] 2>/dev/null; then
            DUR_HUMAN="unknown"
            START_ISO="unknown"
            END_ISO="unknown"
          else
            DUR=$((END - JOB_START))
            MIN=$((DUR / 60))
            SEC=$((DUR % 60))
            DUR_HUMAN="${MIN}m ${SEC}s (${DUR}s)"
            START_ISO=$(date -u -d "@${JOB_START}" --iso-8601=seconds 2>/dev/null || echo "unknown")
            END_ISO=$(date -u -d "@${END}" --iso-8601=seconds 2>/dev/null || echo "unknown")
          fi
          {
            echo "### Job timing: ${JOB_NAME}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Duration | ${DUR_HUMAN} |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Start | ${START_ISO} |"
            echo "| End | ${END_ISO} |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  # ── Build-Sign Collector (output aggregation for matrix) ─────────────────
  # GRO-fuxa: GitHub matrix-job outputs aren't directly addressable as
  # `needs.build-sign.outputs.*` (they're per-leg, last-one-wins semantics).
  # This collector job depends on both matrix legs (so it only runs when
  # both succeed), and re-emits the deterministic image-tag as a single
  # workflow-level output. Downstream `cmx-test` consumes it from here.
  # See https://github.com/orgs/community/discussions/17245 for the canonical
  # pattern.
  build-sign-collect:
    name: Collect build-sign outputs
    runs-on: ubuntu-latest
    needs: [detect-changes, build-sign]
    if: needs.detect-changes.outputs.code == 'true'
    outputs:
      image-tag: ${{ steps.compute.outputs.tag }}
    steps:
      - name: Compute image tag (must match matrix legs)
        id: compute
        run: |
          # Tag is deterministic from PR number + sha — recompute here instead
          # of trying to thread per-leg outputs through a matrix job.
          TAG="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

  # ── Replicated Release and CMX Test ──────────────────────────────────────
  # Customer-grade install: per-PR channel + trial customer + ephemeral CMX
  # cluster + OCI install from registry.replicated.com. Exercises the same
  # code path a real customer does (proxy.xyyzx.net pulls, Replicated SDK,
  # license secret shape, channel-gated release visibility). See GRO-lcva.
  #
  # Slug normalization extends the platform-examples pattern
  # (replicatedhq/platform-examples applications/wg-easy/taskfiles/utils.yml
  # `normalize-name`, which does `tr '/_.' '-'`) with lowercasing,
  # invalid-char stripping, and a truncate+sha7 fallback for branch names
  # longer than 36 chars.
  #
  # Secret requirements:
  #   - REPLICATED_API_TOKEN: create channel/customer/cluster + channel archive.
  #   - REPLICATED_ADMIN_TOKEN (optional): only needed if REPLICATED_API_TOKEN
  #     lacks `channel demote` permission. Used in pr-cleanup.yaml.
  cmx-test:
    name: Replicated Release and CMX Test
    runs-on: ubuntu-latest
    # GRO-fuxa: consume image-tag from build-sign-collect aggregator (matrix
    # job outputs aren't directly addressable). build-sign itself is also
    # listed so cmx-test still gates on both matrix legs succeeding.
    needs: [detect-changes, build-sign, build-sign-collect]
    if: needs.detect-changes.outputs.code == 'true'
    env:
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
      IMAGE_TAG: ${{ needs.build-sign-collect.outputs.image-tag }}
    steps:
      - name: Record job start
        id: job_start
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      # GRO-sm7y: cache resolved subchart tarballs keyed on Chart.lock hash.
      # Mirrors helm-lint's cache (added in GRO-i987). Both `Package chart`
      # and `Pre-install cluster-shared infra` run `helm dependency update
      # chart/`; on cache hit the subchart tarballs are already on disk so
      # the dep-update is effectively a no-op (~10-30s saved per run when
      # Chart.lock is unchanged). Per-runner-OS prefix matches helm-lint.
      - name: Cache helm chart deps
        uses: actions/cache@v5
        with:
          path: chart/charts
          key: helm-deps-${{ runner.os }}-${{ hashFiles('chart/Chart.lock') }}
          restore-keys: |
            helm-deps-${{ runner.os }}-

      # GRO-uqtg: single point-of-truth for chart-dep resolution in this job.
      # Previously each downstream step that needed extracted subcharts called
      # `helm dependency update chart/` itself, which re-ran registry lookups
      # and re-downloaded tarballs ~10-20s per invocation. Consolidating here
      # means downstream steps (Package chart, Pre-install cluster-shared
      # infra, Install groovelab) can rely on `chart/charts/*.tgz` AND
      # `chart/charts/<dep>/` already existing.
      - name: Resolve chart dependencies
        run: |
          helm dependency update chart/
          # Helm v4 requires extracted subchart directories for downstream
          # lint/install/template operations. Extract tarballs once here so
          # downstream steps can rely on both the tarball and the directory
          # being present.
          cd chart/charts
          for f in *.tgz; do
            [ -f "$f" ] || continue
            DIR="${f%.tgz}"
            if [ ! -d "$DIR" ]; then
              tar xzf "$f"
            fi
          done
          cd ../..
          echo "Chart dependencies resolved:"
          ls -la chart/charts/

      # GRO-mf1d: pinned, deduplicated install via local composite action
      # (.github/actions/setup-replicated-cli). The previous inline pattern
      # called api.github.com/.../releases/latest, which was rate-limited and
      # silently chased the newest CLI release.
      - name: Install Replicated CLI
        uses: ./.github/actions/setup-replicated-cli

      # Step 1 — Compute slug and chart version from the PR branch.
      # Slug normalization algorithm (see story GRO-lcva):
      #   1. lowercase
      #   2. replace '/' '_' '.' with '-' (extends platform-examples
      #      `tr '/_.' '-'`; see wg-easy/taskfiles/utils.yml `normalize-name`)
      #   3. strip anything not [a-z0-9-], collapse runs of '-'
      #   4. trim leading/trailing '-'
      #   5. if length > 36: truncate to 28, append '-<sha7>' of original name
      #
      # CHART_VERSION is based on the current Chart.yaml version + short SHA
      # so it is deterministic per-commit and naturally sorts below the next
      # stable release. The HelmChart CR (release/helmchart.yaml) is synced
      # to match so Replicated can resolve the chart at release-create time.
      #
      # HEAD_REF is attacker-controlled; pass via env and quote in shell to
      # avoid workflow command injection.
      - name: Compute slug and chart version
        id: slug
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Slug normalization is sourced from scripts/replicated-slug.sh —
          # the single source of truth shared with pr-cleanup.yaml and the
          # local Makefile (`make pr-slug`). See GRO-m1bc.
          # shellcheck source=../../scripts/replicated-slug.sh
          source "${GITHUB_WORKSPACE}/scripts/replicated-slug.sh"
          BRANCH="$HEAD_REF"
          SLUG=$(normalize-slug "$BRANCH")
          # Defensive: ensure slug is non-empty for pathological input.
          if [ -z "$SLUG" ]; then
            SLUG="pr-${PR_NUMBER}"
          fi
          BASE_VERSION=$(yq -r '.version' chart/Chart.yaml)
          SHORT_SHA="${GITHUB_SHA::7}"
          CHART_VERSION="${BASE_VERSION}-${SHORT_SHA}"
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Branch:        ${BRANCH}"
          echo "Slug:          ${SLUG}  (length ${#SLUG})"
          echo "Chart version: ${CHART_VERSION}"

      # Step 2 — Sync chart version files so Replicated can resolve the chart.
      # Mirrors release.yaml. Without this the HelmChart CR chartVersion drifts
      # from the packaged chart version and `replicated release create` fails
      # with "does not have a matching HelmChart custom resource".
      - name: Sync Chart.yaml version
        env:
          CHART_VERSION: ${{ steps.slug.outputs.chart_version }}
        run: |
          yq -i ".version = \"${CHART_VERSION}\"" chart/Chart.yaml
          echo "Chart.yaml version synced:"
          grep -E "^version:" chart/Chart.yaml

      - name: Sync release/helmchart.yaml chartVersion
        env:
          CHART_VERSION: ${{ steps.slug.outputs.chart_version }}
        run: |
          yq -i ".spec.chart.chartVersion = \"${CHART_VERSION}\"" release/helmchart.yaml
          echo "release/helmchart.yaml chartVersion synced:"
          grep -E "chartVersion:" release/helmchart.yaml

      # Step 3 — Package the chart into release/ so `replicated release create
      # --yaml-dir release/` picks up the tgz rather than the raw chart/ tree.
      - name: Package chart
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          CHART_VERSION: ${{ steps.slug.outputs.chart_version }}
        run: |
          # GRO-uqtg: chart deps are resolved once in the upstream "Resolve
          # chart dependencies" step. No need to re-run `helm dependency
          # update` here.
          mkdir -p release/
          # --app-version MUST match the GHCR image tag the build job pushed
          # (env IMAGE_TAG, format `pr-<PR_NUMBER>-<SHORT_SHA>`), because the
          # chart templates default `image.<side>.tag` to `.Chart.AppVersion`
          # and we don't pass `--set image.<side>.tag=...` on the customer-
          # grade install (Replicated injects values, but only rewrites the
          # repository — never the tag). Mismatched tag = ImagePullBackOff
          # against `proxy.xyyzx.net/proxy/groovelab/.../groovelab-backend:<wrong-tag>`.
          helm package chart/ \
            --version "$CHART_VERSION" \
            --app-version "$IMAGE_TAG" \
            --destination /tmp/
          mv "/tmp/groovelab-${CHART_VERSION}.tgz" release/
          ls -la release/

      # Step 3 — Create or reuse the per-PR channel (idempotent on re-runs).
      - name: Create or reuse per-PR channel
        id: channel
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          EXISTING=$(replicated channel ls --app "${APP_SLUG}" --output json \
            | jq -r --arg n "$SLUG" '.[] | select(.name == $n) | .id // empty')
          if [ -n "$EXISTING" ]; then
            CHANNEL_ID="$EXISTING"
            echo "Reusing existing channel ${SLUG} (ID: ${CHANNEL_ID})"
          else
            # `replicated channel create --output json` returns an array
            # (`[{"id":"...","name":"..."}]`) in current CLI versions. Accept
            # either shape via an `if type==array` fallback so we don't break
            # when the CLI normalizes to a single object in the future.
            CHANNEL_JSON=$(replicated channel create \
              --name "$SLUG" \
              --app "${APP_SLUG}" \
              --output json)
            CHANNEL_ID=$(echo "$CHANNEL_JSON" \
              | jq -r --arg n "$SLUG" '
                  if type == "array" then
                    (.[] | select(.name == $n) | .id)
                  else
                    (.channel.id // .id // empty)
                  end' \
              | head -n1)
            if [ -z "$CHANNEL_ID" ]; then
              CHANNEL_ID=$(replicated channel ls --app "${APP_SLUG}" --output json \
                | jq -r --arg n "$SLUG" '.[] | select(.name == $n) | .id')
            fi
            echo "Channel created: ${SLUG} (ID: ${CHANNEL_ID})"
          fi
          echo "id=${CHANNEL_ID}" >> "$GITHUB_OUTPUT"

      # Step 4 — Create release from packaged tgz and promote to per-PR channel.
      - name: Create and promote release
        id: release
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          CHART_VERSION: ${{ steps.slug.outputs.chart_version }}
        run: |
          RELEASE_JSON=$(replicated release create \
            --yaml-dir release/ \
            --promote "$SLUG" \
            --version "$CHART_VERSION" \
            --app "${APP_SLUG}" \
            --output json)
          # CLI returns either an object or a single-element array; handle both.
          SEQ=$(echo "$RELEASE_JSON" \
            | jq -r '
                if type == "array" then
                  (.[0].sequence // empty)
                else
                  (.sequence // .release.sequence // empty)
                end')
          echo "sequence=${SEQ}" >> "$GITHUB_OUTPUT"
          echo "Release sequence: ${SEQ} (version ${CHART_VERSION}) promoted to ${SLUG}"

      # Step 5 — Create or reuse a dev customer licensed to this channel.
      # GRO-e4wb (rework): switched from `--type trial --expires-in 24h` to
      # `--type dev` with no expiration. Dev customers don't expire by default,
      # which suits CI where the same per-PR customer is reused across many
      # iterations over days/weeks until PR close. Project owner direction.
      - name: Create or reuse dev customer
        id: customer
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          CUSTOMER_NAME="pr-${SLUG}"
          EXISTING=$(replicated customer ls --app "${APP_SLUG}" --output json \
            | jq -r --arg n "$CUSTOMER_NAME" '.[] | select(.name == $n) | .installationId // empty')
          if [ -n "$EXISTING" ]; then
            LICENSE_ID="$EXISTING"
            echo "Reusing existing dev customer ${CUSTOMER_NAME}"
          else
            CUSTOMER_JSON=$(replicated customer create \
              --name "$CUSTOMER_NAME" \
              --email "pr+${SLUG}@replicated.com" \
              --channel "$SLUG" \
              --type dev \
              --app "${APP_SLUG}" \
              --output json)
            LICENSE_ID=$(echo "$CUSTOMER_JSON" \
              | jq -r --arg n "$CUSTOMER_NAME" '
                  if type == "array" then
                    (.[] | select(.name == $n) | .installationId // empty)
                  else
                    (.installationId // .customer.installationId // empty)
                  end' \
              | head -n1)
            if [ -z "$LICENSE_ID" ] || [ "$LICENSE_ID" = "null" ]; then
              LICENSE_ID=$(replicated customer ls --app "${APP_SLUG}" --output json \
                | jq -r --arg n "$CUSTOMER_NAME" '.[] | select(.name == $n) | .installationId')
            fi
            echo "Dev customer created: ${CUSTOMER_NAME}"
          fi
          if [ -z "$LICENSE_ID" ] || [ "$LICENSE_ID" = "null" ]; then
            echo "ERROR: could not resolve licenseID for ${CUSTOMER_NAME}"
            exit 1
          fi
          # License ID is a secret — mask it in logs.
          echo "::add-mask::${LICENSE_ID}"
          echo "license_id=${LICENSE_ID}" >> "$GITHUB_OUTPUT"

      # Step 6 — Lookup-or-create the medium-life shared CMX k3s cluster
      # (GRO-e4wb). Single global cluster `groovelab-ci` (TTL 24h) is reused
      # across PRs and runs; isolation between PRs is achieved at the
      # Kubernetes namespace layer (`groovelab-pr-<slug>`), not the cluster
      # layer. Customer + channel remain per-PR (handled in steps 3-5).
      #
      # First PR run after the previous cluster TTL'd will pay a one-time
      # ~2-3 min provisioning cost; all subsequent runs (across same PR
      # re-runs and parallel PRs alike) skip cluster create entirely.
      # Need-infra-install flag is set on a fresh cluster so step 7 knows
      # whether to install the shared CNPG operator.
      - name: Lookup or create shared CMX cluster
        id: cluster
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          CLUSTER_NAME="groovelab-ci"
          # Lookup an existing running cluster by name first. `replicated
          # cluster ls` may return recently-removed clusters too (status !=
          # "running"), so filter on status == "running" to avoid picking
          # up a stale ID that no longer routes.
          CLUSTER_ID=$(replicated cluster ls --output json \
            | jq -r --arg n "$CLUSTER_NAME" \
                '[.[] | select(.name == $n and .status == "running")][0].id // empty')
          if [ -z "$CLUSTER_ID" ]; then
            echo "[$(date +%H:%M:%S)] No existing running ${CLUSTER_NAME}; provisioning new (TTL 24h)..."
            CLUSTER_JSON=$(replicated cluster create \
              --distribution k3s \
              --version "${K3S_VERSION}" \
              --name "$CLUSTER_NAME" \
              --ttl 24h \
              --wait 5m \
              --app "${APP_SLUG}" \
              --output json)
            CLUSTER_ID=$(echo "$CLUSTER_JSON" \
              | jq -r --arg n "$CLUSTER_NAME" '
                  if type == "array" then
                    (.[] | select(.name == $n) | .id // empty)
                  else
                    (.id // .cluster.id // empty)
                  end' \
              | head -n1)
            echo "Cluster provisioned: ${CLUSTER_NAME} (ID: ${CLUSTER_ID})"
            echo "need_infra_install=true" >> "$GITHUB_OUTPUT"
          else
            echo "[$(date +%H:%M:%S)] Reusing existing ${CLUSTER_NAME} (ID: ${CLUSTER_ID})"
            echo "need_infra_install=false" >> "$GITHUB_OUTPUT"
          fi
          echo "id=${CLUSTER_ID}" >> "$GITHUB_OUTPUT"
          echo "name=${CLUSTER_NAME}" >> "$GITHUB_OUTPUT"
          # Per-PR namespace name. Same slug as channel/customer; isolates
          # this PR's groovelab release on the shared cluster. The slug has
          # already been normalized to DNS-safe chars in step 1.
          NAMESPACE="groovelab-pr-${SLUG}"
          # Kubernetes DNS-1123 labels are capped at 63 chars; defensive trim.
          NAMESPACE="${NAMESPACE:0:63}"
          # Strip any trailing hyphen left over from truncation so the value
          # remains a valid DNS-1123 label.
          NAMESPACE="${NAMESPACE%-}"
          echo "namespace=${NAMESPACE}" >> "$GITHUB_OUTPUT"
          echo "Per-PR namespace: ${NAMESPACE}"

      # Cost observability (AC 9). Best-effort: don't fail the job if the
      # subcommand name changes across CLI versions.
      - name: Print cluster cost
        if: steps.cluster.outputs.id != ''
        env:
          CLUSTER_ID: ${{ steps.cluster.outputs.id }}
        run: |
          replicated cluster inspect "$CLUSTER_ID" --app "${APP_SLUG}" || true

      - name: Export kubeconfig
        env:
          CLUSTER_ID: ${{ steps.cluster.outputs.id }}
        run: |
          replicated cluster kubeconfig "$CLUSTER_ID" \
            --app "${APP_SLUG}" \
            --output-path "${{ runner.temp }}/kubeconfig.yaml"
          echo "KUBECONFIG=${{ runner.temp }}/kubeconfig.yaml" >> "$GITHUB_ENV"

      - name: Verify cluster access
        run: kubectl cluster-info

      # Step 7 — Customer-grade install via bare `helm install oci://...`
      # (GRO-i6sx). Replicated's OCI registry injects license-scoped values
      # (notably `global.replicated.dockerconfigjson`, which the SDK subchart
      # renders into `enterprise-pull-secret`) into the chart at `helm pull`/
      # `helm install` time, but ONLY when the caller is authenticated via
      # `helm registry login` against the OCI URL directly. Helmfile breaks
      # this contract: it does `helm pull` → extract → `helm install
      # <local-path>`, so the final install is from a local dir and value
      # injection never fires. Result on plain helm via helmfile: the SDK's
      # `enterprise-pull-secret` template has nothing to render and app pods
      # can't pull from `proxy.xyyzx.net`.
      #
      # Fix: use bare `helm install oci://...` after `helm registry login`,
      # and pre-install the CNPG operator separately so its CRDs exist
      # before the groovelab chart renders the postgresql.cnpg.io Cluster CR.
      # This mirrors release.yaml's CNPG pre-install step.
      #
      # helmfile.yaml.gotmpl is unchanged and still works for local dev (the
      # dev path doesn't need Replicated value injection). The chart-side
      # crd-check Helm hook from GRO-s3mc is still in place as
      # belt-and-suspenders.
      # Step 7 — Pre-install (or reuse) cluster-shared infrastructure.
      # GRO-e4wb: on a fresh cluster, install BOTH the CNPG operator AND
      # cert-manager once into shared namespaces; on cluster reuse, skip —
      # both are already there and `helm install` would fail with "release
      # already exists" / "CRD already exists" on collision.
      #
      # Why cert-manager has to be pre-installed (rework): cert-manager's
      # CRDs (challenges.acme.cert-manager.io, certificates.cert-manager.io,
      # etc.) are cluster-scoped. The first per-PR `helm install groovelab
      # oci://...` claims ownership via `meta.helm.sh/release-name` +
      # `meta.helm.sh/release-namespace` annotations. The second per-PR
      # install (parallel PR or reused cluster) tries to claim the same CRDs
      # under a different release-namespace and Helm v4 rejects with:
      #   `CustomResourceDefinition "challenges.acme.cert-manager.io" ...
      #    annotation validation error: key "meta.helm.sh/release-namespace"
      #    must equal "<ns-2>": current value is "<ns-1>"`
      # Same multi-tenancy issue as CNPG. Fix is identical: install once at
      # cluster-create time under `cert-manager` ns, then disable the
      # cert-manager subchart on every per-PR `helm install`.
      #
      # The chart dep update is still always required (we need the
      # cloudnative-pg-*.tgz and cert-manager-*.tgz on disk for the if-true
      # path AND for the `helm package` step that already ran). Run it even
      # on the skip path so that the helm-package output earlier in the job
      # and the downstream OCI install both have a consistent on-disk
      # `chart/charts/`.
      - name: Pre-install cluster-shared infra (CNPG + cert-manager)
        env:
          NEED_INFRA_INSTALL: ${{ steps.cluster.outputs.need_infra_install }}
        run: |
          if [ "$NEED_INFRA_INSTALL" != "true" ]; then
            echo "[$(date +%H:%M:%S)] Reusing shared cluster — CNPG + cert-manager already installed; skipping."
            exit 0
          fi
          # GRO-uqtg: chart deps + tarball extraction are handled once in the
          # upstream "Resolve chart dependencies" step. `chart/charts/<dep>/`
          # is already present here for both cloudnative-pg and cert-manager.
          echo "[$(date +%H:%M:%S)] Installing CNPG operator into cnpg-system..."
          helm install cnpg-operator chart/charts/cloudnative-pg \
            --namespace cnpg-system --create-namespace \
            --wait --timeout 3m
          echo "[$(date +%H:%M:%S)] Installing cert-manager into cert-manager ns..."
          # cert-manager subchart name varies (`cert-manager-v1.19.4` etc.);
          # glob to the directory and pick the first match. Use a shell glob
          # rather than `ls -d` to keep shellcheck happy (SC2012).
          CM_DIR=""
          for d in chart/charts/cert-manager-*/; do
            if [ -d "$d" ]; then CM_DIR="${d%/}"; break; fi
          done
          if [ -z "$CM_DIR" ] || [ ! -d "$CM_DIR" ]; then
            # Some Helm versions extract to chart/charts/cert-manager (no
            # version suffix). Fall back to that.
            CM_DIR="chart/charts/cert-manager"
          fi
          # CRDs ship in the same chart by default (installCRDs/crds.enabled
          # depending on cert-manager version). cert-manager 1.19 uses
          # `crds.enabled=true` to install CRDs as part of the chart.
          helm install cert-manager "$CM_DIR" \
            --namespace cert-manager --create-namespace \
            --set crds.enabled=true \
            --wait --timeout 3m

      # GRO-e4wb: create the per-PR namespace BEFORE the helm install step
      # so smoke tests, port-forwards, and the upgrade test all have a
      # stable target. `kubectl create namespace --dry-run=client | apply -f -`
      # is idempotent across PR re-runs.
      - name: Create per-PR namespace
        env:
          NAMESPACE: ${{ steps.cluster.outputs.namespace }}
        run: |
          kubectl create namespace "$NAMESPACE" \
            --dry-run=client -o yaml \
            | kubectl apply -f -
          echo "[$(date +%H:%M:%S)] Namespace ${NAMESPACE} ready."

      - name: Helm registry login (registry.replicated.com)
        env:
          LICENSE_ID: ${{ steps.customer.outputs.license_id }}
        run: |
          # Authenticated login is what arms Replicated's value-injection
          # intercept on subsequent `helm pull`/`helm install oci://...`
          # against the same registry. License ID is both username and
          # password (Replicated convention).
          echo "$LICENSE_ID" \
            | helm registry login registry.replicated.com \
              --username "$LICENSE_ID" \
              --password-stdin

      - name: Verify license injection (helm show values diagnostic)
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          CHART_VERSION: ${{ steps.slug.outputs.chart_version }}
        run: |
          # Load-bearing self-test (GRO-i6sx AC3): if Replicated's value
          # injection is firing correctly, `helm show values oci://...`
          # output will contain a non-empty `global.replicated.dockerconfigjson`
          # field. If absent or empty, license injection is not firing and
          # the subsequent `helm install` would silently render an empty
          # `enterprise-pull-secret`, sending app pods straight into
          # ImagePullBackOff. Fail loud here instead.
          #
          # Use yq (already a workflow dep, see release.yaml) for structural
          # YAML parsing — a plain `grep dockerconfigjson:` is unsafe because
          # `helm show values` prints values.yaml verbatim including the
          # documentation comment that mentions `dockerconfigjson` by name,
          # so the diagnostic would falsely pass even when injection didn't
          # fire (the comment substring matches).
          OCI_URL="oci://registry.replicated.com/${APP_SLUG}/${SLUG}/${APP_SLUG}"
          echo "[$(date +%H:%M:%S)] helm show values ${OCI_URL} --version ${CHART_VERSION}"
          helm show values "$OCI_URL" \
            --version "$CHART_VERSION" \
            > /tmp/injected-values.yaml
          INJECTED=$(yq -r '.global.replicated.dockerconfigjson // ""' /tmp/injected-values.yaml)
          if [ -z "$INJECTED" ]; then
            echo "FAIL: helm show values did not return a non-empty global.replicated.dockerconfigjson — license injection is not firing."
            echo "----- helm show values output (first 80 lines) -----"
            head -80 /tmp/injected-values.yaml
            exit 1
          fi
          echo "OK: license injection verified. dockerconfigjson present (length: ${#INJECTED} bytes)."

      - name: Install groovelab via OCI (Replicated injects values)
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          CHART_VERSION: ${{ steps.slug.outputs.chart_version }}
          NAMESPACE: ${{ steps.cluster.outputs.namespace }}
        run: |
          # No `--set replicated.enabled=...` or `--set
          # global.replicated.dockerconfigjson=...` overrides — Replicated's
          # OCI value injection supplies the dockerconfigjson at install
          # time, and the chart defaults `replicated.enabled=true`. This is
          # the customer-grade path. GRO-i6sx AC4.
          #
          # `--set cloudnative-pg.enabled=false` mirrors helmfile.yaml.gotmpl:
          # the CNPG operator is installed as its own Helm release in the
          # previous step, so the embedded cloudnative-pg subchart must be
          # disabled here. Otherwise Helm v4 rejects the install with
          # "CustomResourceDefinition ... cannot be imported into the current
          # release: invalid ownership metadata" because the CNPG CRDs already
          # carry release-name=cnpg-operator annotations.
          #
          # `--set cert-manager.enabled=false` is the SAME multi-tenancy
          # fix applied to cert-manager (GRO-e4wb rework). cert-manager is
          # pre-installed once at cluster-create time; per-PR installs must
          # disable the subchart so they don't try to re-claim ownership of
          # the cluster-scoped cert-manager CRDs (challenges.acme.cert-
          # manager.io etc.). Without this, the second PR on the shared
          # cluster fails with `meta.helm.sh/release-namespace must equal
          # "<ns-2>": current value is "<ns-1>"`.
          #
          # GRO-e4wb: install into per-PR namespace `groovelab-pr-<slug>` on
          # the medium-life shared cluster. Each PR gets its own release in
          # its own namespace so parallel PR runs don't collide.
          OCI_URL="oci://registry.replicated.com/${APP_SLUG}/${SLUG}/${APP_SLUG}"
          echo "[$(date +%H:%M:%S)] helm install ${APP_SLUG} ${OCI_URL} --version ${CHART_VERSION} -n ${NAMESPACE}"
          # No --wait here: the next step ("Wait for pods to be ready") polls
          # kubectl with timestamped lines and a 5m deadline, and dumps
          # `kubectl describe pods` on timeout. That's strictly better
          # observability than a silent `helm install --wait` deadline.
          #
          # `helm upgrade --install` (not bare `helm install`) is the
          # idempotent verb required by the GRO-e4wb medium-life cluster
          # lifecycle: PR re-runs reuse the same namespace, so a second push
          # to the same PR would otherwise hit
          #   `release name check failed: cannot reuse a name that is still
          #    in use`.
          # `upgrade --install` no-ops to install on first run and upgrades
          # on every subsequent run, which is what we want.
          helm upgrade --install "${APP_SLUG}" "$OCI_URL" \
            --version "$CHART_VERSION" \
            --namespace "$NAMESPACE" --create-namespace \
            --set cloudnative-pg.enabled=false \
            --set cert-manager.enabled=false

      # Step 8 — Smoke tests against the customer-grade install.
      - name: Wait for pods to be ready
        env:
          NAMESPACE: ${{ steps.cluster.outputs.namespace }}
        run: |
          DEADLINE=$(($(date +%s) + 300))
          while true; do
            echo "[$(date +%H:%M:%S)] Pod status:"
            kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null || true
            NOT_READY=$(kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null \
              | grep -v -E "Running|Completed" || true)
            [ -z "$NOT_READY" ] && break
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "TIMEOUT: pods not ready after 5 minutes"
              echo "===== Non-Running pods (full describe) ====="
              kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null \
                | grep -v -E "Running|Completed" \
                | awk '{print $1}' \
                | while read -r POD; do
                    echo "----- describe $POD -----"
                    kubectl describe pod "$POD" -n "$NAMESPACE" 2>/dev/null
                  done
              echo "===== Recent events ====="
              kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp 2>/dev/null | tail -30
              echo "===== imagePullSecrets on Deployments ====="
              kubectl get deploy -n "$NAMESPACE" -o jsonpath='{range .items[*]}{.metadata.name}{": "}{.spec.template.spec.imagePullSecrets}{"\n"}{end}' 2>/dev/null
              echo "===== enterprise-pull-secret presence ====="
              kubectl get secret -n "$NAMESPACE" enterprise-pull-secret -o jsonpath='{.metadata.name}{"\n"}' 2>/dev/null \
                || echo "enterprise-pull-secret NOT present"
              exit 1
            fi
            sleep 15
          done
          echo "All pods running."

      # GRO-510z — Cosign keyless verification of the GHCR-published images
      # used by this install. Runs AFTER pods are Running (so a stale-cache
      # or registry-mirror tampering scenario is caught against the image
      # the cluster actually pulled), and BEFORE smoke tests (so a signature
      # mismatch fails the job at the security gate, not buried in app
      # behavior). The build-sign job in this same workflow keyless-signs
      # the same ${IMAGE_TAG} (= pr-<N>-<sha7>) for both frontend + backend;
      # the chart's appVersion is set to ${IMAGE_TAG} at package time, so
      # verifying groovelab-{frontend,backend}:${IMAGE_TAG} here is
      # equivalent to verifying what the running pods pulled.
      #
      # Identity regex is anchored to the repo + workflow path so a stolen
      # OIDC token from a different repo or workflow can't substitute a
      # signature for ours. OIDC issuer is the GitHub Actions issuer.
      # All inputs come from env (IMAGE_TAG, GHCR_PREFIX) — no untrusted
      # github.event.* fields are interpolated into the run: script.
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Verify image signatures (cosign keyless)
        env:
          IMAGE_REF_TAG: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          IDENTITY_REGEXP='^https://github.com/adamancini/groovelab/.github/workflows/pr.yaml@'
          OIDC_ISSUER='https://token.actions.githubusercontent.com'
          for image in groovelab-frontend groovelab-backend; do
            REF="${GHCR_PREFIX}/${image}:${IMAGE_REF_TAG}"
            echo "[$(date +%H:%M:%S)] cosign verify ${REF}"
            # Defense-in-depth (story AC6): JSON-parse the verify output and
            # confirm the verified docker-reference matches the image we
            # actually intended to verify. Catches the (rare) case where
            # cosign exits 0 against a substituted reference.
            VERIFIED_REF=$(cosign verify "${REF}" \
              --certificate-identity-regexp="${IDENTITY_REGEXP}" \
              --certificate-oidc-issuer="${OIDC_ISSUER}" \
              --output json \
              | jq -r '.[0].critical.identity."docker-reference" // empty')
            if [ -z "${VERIFIED_REF}" ]; then
              echo "FAIL: cosign verify for ${image} returned no docker-reference"
              exit 1
            fi
            EXPECTED_REPO="${GHCR_PREFIX}/${image}"
            case "${VERIFIED_REF}" in
              "${EXPECTED_REPO}"|"${EXPECTED_REPO}":*)
                echo "OK: ${image} signature verified (subject=${VERIFIED_REF})"
                ;;
              *)
                echo "FAIL: ${image} signature verified but docker-reference mismatch."
                echo "  expected repo: ${EXPECTED_REPO}"
                echo "  verified ref:  ${VERIFIED_REF}"
                exit 1
                ;;
            esac
          done

      - name: Smoke test — /healthz 200 and session contract 404
        env:
          NAMESPACE: ${{ steps.cluster.outputs.namespace }}
        run: |
          kubectl port-forward svc/groovelab-backend 18080:8080 -n "$NAMESPACE" &
          PF_PID=$!
          sleep 5

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18080/healthz)
          if [ "$HTTP_CODE" != "200" ]; then
            kill "$PF_PID" 2>/dev/null || true
            echo "FAIL: /healthz returned HTTP ${HTTP_CODE}, expected 200"
            exit 1
          fi
          echo "PASS: /healthz returned HTTP 200"

          ANSWER_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST -H 'Content-Type: application/json' -d '{}' \
            http://localhost:18080/api/v1/flashcards/answer)
          kill "$PF_PID" 2>/dev/null || true
          if [ "$ANSWER_CODE" != "404" ]; then
            echo "FAIL: POST /api/v1/flashcards/answer returned HTTP ${ANSWER_CODE}, expected 404"
            exit 1
          fi
          echo "PASS: POST /api/v1/flashcards/answer returned HTTP 404 (no session)"

      # Step 9 — Upgrade test: publish a second release on the same channel,
      # then re-run `helm upgrade oci://...` against the upgrade version.
      # Same value-injection contract as the install step — OCI URL +
      # authenticated registry login means Replicated injects the
      # license-scoped dockerconfigjson at upgrade time too. The CNPG
      # operator release stays at its installed version (we only upgrade
      # groovelab here). The post-upgrade CRD-check Helm hook in the chart
      # re-validates that required CRDs are still Established.
      - name: Upgrade test — package + release + helm upgrade
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          NAMESPACE: ${{ steps.cluster.outputs.namespace }}
          CHART_VERSION: ${{ steps.slug.outputs.chart_version }}
        run: |
          UPGRADE_VERSION="${CHART_VERSION}.1"
          rm -f release/groovelab-*.tgz
          # Same appVersion contract as the install Package step:
          # appVersion must match the GHCR tag the build job pushed.
          # Upgrade reuses the SAME image (only chart bumps), so IMAGE_TAG
          # is correct here too. Previous value `pr-${SLUG}-upgrade` was
          # also broken — no GHCR image is published under that tag.
          helm package chart/ \
            --version "$UPGRADE_VERSION" \
            --app-version "$IMAGE_TAG" \
            --destination /tmp/
          mv "/tmp/groovelab-${UPGRADE_VERSION}.tgz" release/

          # Sync HelmChart CR chartVersion for the upgrade release so
          # Replicated can resolve the bumped chart.
          yq -i ".spec.chart.chartVersion = \"${UPGRADE_VERSION}\"" release/helmchart.yaml

          replicated release create \
            --yaml-dir release/ \
            --promote "$SLUG" \
            --version "$UPGRADE_VERSION" \
            --app "${APP_SLUG}" \
            --output json

          OCI_URL="oci://registry.replicated.com/${APP_SLUG}/${SLUG}/${APP_SLUG}"
          # Replicated's OCI registry can lag a few seconds behind a fresh
          # `release create --promote`. Poll until `helm show chart` succeeds
          # against the new version (max ~60s) before running `helm upgrade`,
          # otherwise we hit `FetchReference: <oci-url>:<ver>: not found`.
          echo "[$(date +%H:%M:%S)] Waiting for OCI registry to publish ${UPGRADE_VERSION}..."
          for i in $(seq 1 12); do
            if helm show chart "$OCI_URL" --version "$UPGRADE_VERSION" >/dev/null 2>&1; then
              echo "[$(date +%H:%M:%S)] OCI registry ready (attempt $i)."
              break
            fi
            echo "[$(date +%H:%M:%S)] Not yet (attempt $i/12), sleeping 5s..."
            sleep 5
          done

          echo "[$(date +%H:%M:%S)] helm upgrade ${APP_SLUG} ${OCI_URL} --version ${UPGRADE_VERSION}"
          helm upgrade "${APP_SLUG}" "$OCI_URL" \
            --version "$UPGRADE_VERSION" \
            --namespace "$NAMESPACE" \
            --set cloudnative-pg.enabled=false \
            --set cert-manager.enabled=false \
            --wait --timeout 6m

          echo "Re-running smoke tests after upgrade..."
          kubectl port-forward svc/groovelab-backend 18081:8080 -n "$NAMESPACE" &
          PF_PID=$!
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18081/healthz)
          kill "$PF_PID" 2>/dev/null || true
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL (post-upgrade): /healthz returned HTTP ${HTTP_CODE}"
            exit 1
          fi
          echo "PASS: post-upgrade /healthz returned 200"

      # Step 10 — Cleanup. GRO-e4wb: the shared `groovelab-ci` cluster is
      # explicitly NOT torn down here; it persists across PR runs (TTL 24h)
      # so subsequent runs (same PR or parallel PRs) skip the ~2-3 min
      # cluster-provisioning cost. Per-PR namespace + customer + channel
      # teardown happens in pr-cleanup.yaml on PR close so re-runs of the
      # same PR reuse them idempotently during iteration.
      #
      # On job failure we leave the namespace intact so the developer can
      # re-run kubectl/helm against it for diagnosis. pr-cleanup.yaml
      # garbage-collects on PR close regardless of last-run outcome.
      - name: Cleanup note (cluster persists)
        if: always()
        env:
          CLUSTER_NAME: ${{ steps.cluster.outputs.name }}
          NAMESPACE: ${{ steps.cluster.outputs.namespace }}
        run: |
          echo "[$(date +%H:%M:%S)] Shared cluster ${CLUSTER_NAME} persists (TTL 24h). Namespace ${NAMESPACE} retained for re-run / debug; pr-cleanup.yaml garbage-collects on PR close."

      # GRO-qrdt: per-job wall-clock timing summary.
      - name: Job timing summary
        if: always()
        env:
          JOB_NAME: ${{ github.job }}
          RUNNER_OS: ${{ runner.os }}
          JOB_START: ${{ steps.job_start.outputs.epoch }}
        run: |
          set +e
          END=$(date +%s)
          if [ -z "$JOB_START" ] || ! [ "$JOB_START" -eq "$JOB_START" ] 2>/dev/null; then
            DUR_HUMAN="unknown"
            START_ISO="unknown"
            END_ISO="unknown"
          else
            DUR=$((END - JOB_START))
            MIN=$((DUR / 60))
            SEC=$((DUR % 60))
            DUR_HUMAN="${MIN}m ${SEC}s (${DUR}s)"
            START_ISO=$(date -u -d "@${JOB_START}" --iso-8601=seconds 2>/dev/null || echo "unknown")
            END_ISO=$(date -u -d "@${END}" --iso-8601=seconds 2>/dev/null || echo "unknown")
          fi
          {
            echo "### Job timing: ${JOB_NAME}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Duration | ${DUR_HUMAN} |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Start | ${START_ISO} |"
            echo "| End | ${END_ISO} |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  # ── CI Timing Aggregator ─────────────────────────────────────────────────
  # GRO-qrdt: posts a sticky PR comment summarizing per-job wall-clock time
  # for this run. Reads timing data via the GitHub REST API (jobs endpoint
  # gives us authoritative `started_at` / `completed_at` per job, including
  # for failed/skipped jobs). Uses `gh api --paginate` so we don't miss jobs
  # if the workflow ever grows past the default page size.
  #
  # The aggregator is observability-only: it must NEVER block PR merge. The
  # post-comment step uses `continue-on-error: true` so a transient gh-API
  # rate-limit or comment-permission glitch doesn't fail the run.
  #
  # Idempotent: finds an existing sticky comment by a hidden HTML marker
  # (`<!-- gro-qrdt:ci-timing-summary -->`) and PATCHes it in place rather
  # than posting a duplicate on every push.
  ci-timing-comment:
    name: CI Timing Summary
    runs-on: ubuntu-latest
    # GRO-fuxa: build-sign is now a matrix; ci-timing-comment fetches per-job
    # timing via REST so it captures both matrix legs as separate rows.
    # build-sign-collect is included so the aggregator runs after the
    # collector resolves (and to prevent it racing past matrix completion).
    # GRO-6gq2: lint-test split into go-test/node-test/helm-lint; aggregator
    # consumes per-job timing via REST so each parallel job appears as its
    # own row in the sticky comment.
    needs: [detect-changes, go-test, node-test, helm-lint, build-sign, build-sign-collect, cmx-test]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Build and post sticky timing comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MARKER: "<!-- gro-qrdt:ci-timing-summary -->"
        # continue-on-error: this step is observability-only; never gate merge.
        continue-on-error: true
        run: |
          set -euo pipefail

          # Fetch all jobs for this run. Filter out the aggregator itself so
          # the comment doesn't show its own (still-running) duration.
          gh api --paginate "repos/${REPO}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.name != "CI Timing Summary")' \
            > /tmp/jobs.ndjson

          # Compute per-job durations + emoji + total wall-clock.
          # `started_at` and `completed_at` are RFC3339; jq's `fromdate`
          # parses both. `select(.completed_at != null)` skips jobs that
          # haven't completed yet (shouldn't happen with `needs:` + `always()`
          # but defensive).
          {
            echo "${MARKER}"
            echo "## CI Timing Summary"
            echo ""
            echo "| Job | Duration | Status |"
            echo "|---|---|---|"
            jq -rs '
              .[]
              | select(.completed_at != null)
              | . as $j
              | (((.completed_at | fromdate) - (.started_at | fromdate)) | floor) as $dur
              | (($dur / 60) | floor) as $m
              | ($dur % 60) as $s
              | (
                  if .conclusion == "success" then ":white_check_mark:"
                  elif .conclusion == "failure" then ":x:"
                  elif .conclusion == "cancelled" then ":no_entry_sign:"
                  elif .conclusion == "skipped" then ":fast_forward:"
                  else ":hourglass:"
                  end
                ) as $emoji
              | "| \(.name) | \($m)m \($s)s | \($emoji) \(.conclusion // .status) |"
            ' /tmp/jobs.ndjson

            # Total wall-clock = sum of completed-job durations. After
            # GRO-fuxa landed (matrix split of build-sign into frontend +
            # backend legs), this sum overcounts wall-clock by ~1 leg's
            # duration when both legs run in parallel — i.e., the printed
            # "Total" is now an upper bound, not the true critical path.
            # The per-leg rows above show the actual wall-clock contribution.
            # Switching this to max(parallel_group) + sequential is a future
            # cleanup; for now the per-row durations are the source of truth.
            TOTAL=$(jq -s '
              [.[]
               | select(.completed_at != null)
               | (((.completed_at | fromdate) - (.started_at | fromdate)) | floor)
              ] | add // 0
            ' /tmp/jobs.ndjson)
            TM=$((TOTAL / 60))
            TS=$((TOTAL % 60))
            echo "| **Total wall-clock** | **${TM}m ${TS}s** | -- |"
            echo ""
            echo "<sub>Total = sum of job durations (linear DAG). When parallel jobs land, this becomes longest-path. Updated on every push to this PR. Source: GRO-qrdt.</sub>"
          } > /tmp/comment.md

          # Find existing sticky comment by marker (hidden HTML comment in body).
          EXISTING_ID=$(gh api --paginate \
            "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -1)

          BODY=$(cat /tmp/comment.md)
          if [ -n "$EXISTING_ID" ]; then
            echo "Updating existing comment ${EXISTING_ID}"
            gh api --method PATCH \
              "repos/${REPO}/issues/comments/${EXISTING_ID}" \
              -f body="$BODY"
          else
            echo "Posting new comment to PR ${PR_NUMBER}"
            gh api --method POST \
              "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -f body="$BODY"
          fi
